<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>haohao.unzip · HAORIO</title>
<meta name="description" content="haohao.unzip · HAORIO 是一個橫向捲軸的 8-bit 遊戲,五關走完 = 34 歲音樂人時代教學。← → 移動,空白鍵跳,撞磚踩 Goomba,跟 NPC 講話收徽章。">
<meta property="og:title" content="haohao.unzip · HAORIO">
<meta property="og:description" content="34 歲音樂人時代教學遊戲。撞磚收歌詞,踩 Goomba,跟年代 NPC 收徽章。">
<meta property="og:image" content="https://okiijuuhyygt.github.io/artist-rpg-mvp/og-image.png">
<meta name="theme-color" content="#5c94fc">
<link rel="icon" type="image/png" href="haohao-head.png">
<link rel="apple-touch-icon" href="haohao-head-64.png">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="build-version" content="haorio-0.2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --nes-black: #1a1a1a;
    --nes-white: #fcfcfc;
    --nes-red: #d82800;
    --nes-yellow: #ffe000;
    --nes-blue: #5c94fc;
    --paper: #efe9de;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    background: #000;
    color: var(--nes-white);
    font-family: 'VT323', monospace;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .pixel { font-family: 'Press Start 2P', monospace; }

  /* ========== top marquee ========== */
  #marquee {
    position: fixed; top: 0; left: 0; right: 0;
    height: 28px; line-height: 28px;
    background: rgba(0,0,0,0.85);
    color: var(--nes-yellow);
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    overflow: hidden;
    white-space: nowrap;
    z-index: 100;
    border-bottom: 2px solid var(--nes-yellow);
  }
  #marquee .track {
    display: inline-block;
    padding-left: 100%;
    animation: scroll-left 28s linear infinite;
    will-change: transform;
  }
  #marquee:hover .track { animation-play-state: paused; }
  @keyframes scroll-left {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }

  /* ========== game viewport ========== */
  #stage-wrap {
    position: fixed;
    inset: 28px 0 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  #game {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #5c94fc;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    box-shadow: 0 0 0 4px #1a1a1a, 0 0 40px rgba(0,0,0,0.5);
  }

  /* ========== HUD overlay ========== */
  #hud {
    position: fixed;
    top: 36px; left: 12px; right: 12px;
    display: flex;
    justify-content: space-between;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--nes-white);
    text-shadow: 2px 2px 0 #000;
    pointer-events: none;
    z-index: 90;
  }
  #hud .left, #hud .right { display: flex; gap: 18px; align-items: center; }
  #hud-exit {
    pointer-events: auto;
    width: 36px; height: 36px;
    border: 3px solid #fff;
    background: rgba(216, 40, 0, 0.7);
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    cursor: pointer;
    margin-left: 8px;
    box-shadow: 2px 2px 0 #1a1a1a;
  }
  #hud-exit:hover { background: rgba(216,40,0,0.9); }
  #hud-exit:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 #1a1a1a; }

  /* ========== touch controls ========== */
  #touch {
    position: fixed;
    bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 16px;
    z-index: 80;
    pointer-events: none;
  }
  .touch-cluster { display: flex; gap: 12px; pointer-events: auto; align-items: flex-end; }
  .touch-btn {
    width: 64px; height: 64px;
    background: rgba(255,255,255,0.2);
    border: 3px solid rgba(255,255,255,0.7);
    border-radius: 12px;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    user-select: none;
    -webkit-user-select: none;
    transition: transform 0.05s, background 0.05s;
  }
  .touch-btn.active {
    background: rgba(255,255,255,0.5);
    transform: scale(0.92);
  }
  #btn-jump { background: rgba(216,40,0,0.5); border-color: rgba(255,200,200,0.8); }
  #btn-jump.active { background: rgba(216,40,0,0.8); }
  #btn-fire { background: rgba(255,224,0,0.5); border-color: rgba(255,250,180,0.8); color: #1a1a1a; }
  #btn-fire.active { background: rgba(255,224,0,0.8); }

  /* ========== virtual joystick (left side) ========== */
  .stick-base {
    width: 88px; height: 88px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 3px solid rgba(255,255,255,0.5);
    position: relative;
    pointer-events: auto;
    backdrop-filter: blur(4px);
    touch-action: none;
  }
  .stick {
    position: absolute;
    left: 50%; top: 50%;
    width: 40px; height: 40px;
    margin: -20px 0 0 -20px;
    border-radius: 50%;
    background: rgba(255,255,255,0.55);
    border: 3px solid rgba(255,255,255,0.9);
    transition: transform 0.08s ease-out;
    pointer-events: none;
  }
  .stick.dragging { transition: none; }
  .stick-base::after {
    content: '◀ ▶';
    position: absolute;
    bottom: -22px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.55);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    pointer-events: none;
  }

  /* ========== modal (stage start / clear / etc) ========== */
  .modal-back {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.78);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .modal-back.open { display: flex; }
  .modal {
    background: var(--paper);
    color: #1a1a1a;
    border: 4px solid #1a1a1a;
    box-shadow: 8px 8px 0 #1a1a1a;
    padding: 24px;
    max-width: 540px;
    width: 100%;
    max-height: 86vh;
    overflow-y: auto;
    font-family: 'VT323', monospace;
    font-size: 22px;
    line-height: 1.5;
  }
  .modal h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    margin: 0 0 14px 0;
    color: var(--nes-red);
  }
  .modal .body { white-space: pre-wrap; margin-bottom: 18px; }
  .modal .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .modal button {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    padding: 12px 18px;
    border: 3px solid #1a1a1a;
    background: var(--nes-yellow);
    color: #1a1a1a;
    cursor: pointer;
    box-shadow: 4px 4px 0 #1a1a1a;
    transition: transform 0.05s, box-shadow 0.05s;
  }
  .modal button:hover { transform: translate(-1px, -1px); box-shadow: 5px 5px 0 #1a1a1a; }
  .modal button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #1a1a1a; }
  .modal button.secondary { background: var(--paper); }

  /* ========== loading ========== */
  #loading {
    position: fixed; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    color: var(--nes-yellow);
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    z-index: 300;
  }

  /* ========== title screen ========== */
  #title-scene { display: none; }
  #title-scene.active { display: flex; }
  #title-scene {
    position: fixed; inset: 28px 0 0 0;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #5c94fc 0%, #2a5ab8 100%);
    z-index: 110;
    padding: 24px;
    text-align: center;
  }
  #title-scene h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(20px, 5vw, 40px);
    color: var(--nes-yellow);
    text-shadow: 4px 4px 0 #1a1a1a;
    margin: 0 0 8px;
  }
  #title-scene .sub {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: #fff;
    text-shadow: 2px 2px 0 #1a1a1a;
    margin: 0 0 28px;
  }
  #title-scene .stages {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    max-width: 600px;
    width: 100%;
    margin-bottom: 24px;
  }
  .stage-tile {
    background: #1a1a1a;
    border: 3px solid var(--nes-yellow);
    color: var(--nes-yellow);
    padding: 14px 8px;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.6);
    transition: transform 0.05s, background 0.05s;
  }
  .stage-tile:hover { background: #2a2a2a; transform: translate(-1px,-1px); }
  .stage-tile .num { font-size: 20px; display: block; margin-bottom: 6px; color: var(--nes-white); }
  .stage-tile.cleared { border-color: var(--nes-red); }
  .stage-tile.cleared::after {
    content: ' ★';
    color: var(--nes-red);
  }
  .stage-tile.selected {
    outline: 4px solid var(--nes-yellow);
    outline-offset: 2px;
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--nes-red);
  }
  .stage-tile.locked { opacity: 0.4; cursor: not-allowed; }
  #title-scene .start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    padding: 16px 28px;
    border: 3px solid #1a1a1a;
    background: var(--nes-red);
    color: #fff;
    cursor: pointer;
    box-shadow: 6px 6px 0 #1a1a1a;
    text-shadow: 2px 2px 0 #1a1a1a;
  }
  #title-scene .start-btn:hover { transform: translate(-1px,-1px); box-shadow: 7px 7px 0 #1a1a1a; }
  #title-scene .start-btn:active { transform: translate(3px,3px); box-shadow: 3px 3px 0 #1a1a1a; }
  #title-scene .meta {
    margin-top: 18px;
    font-size: 14px;
    color: rgba(255,255,255,0.85);
    font-family: 'VT323', monospace;
  }
  #title-scene .meta a { color: var(--nes-yellow); text-decoration: underline; }

  /* ========== badges row ========== */
  .badges-row {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .badge {
    width: 54px;
    height: 54px;
    border: 3px solid #1a1a1a;
    background: rgba(0,0,0,0.4);
    color: #555;
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 3px 3px 0 #1a1a1a;
    filter: grayscale(100%);
    opacity: 0.5;
    transition: all 0.2s;
  }
  .badge.got {
    background: var(--nes-yellow);
    color: #1a1a1a;
    filter: none;
    opacity: 1;
    box-shadow: 4px 4px 0 var(--nes-red);
  }
  .badge .tooltip {
    position: absolute;
    background: #000;
    color: var(--nes-yellow);
    font-size: 10px;
    padding: 4px 6px;
    transform: translateY(60px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .badge:hover .tooltip { opacity: 1; }

  #hud .middle { display: flex; gap: 6px; align-items: center; }
  #hud-badges { display: flex; gap: 4px; font-size: 16px; }
  #hud-badges .b {
    display: inline-block;
    width: 22px; height: 22px;
    line-height: 22px;
    text-align: center;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.3);
    color: #555;
    font-size: 13px;
    filter: grayscale(100%);
  }
  #hud-badges .b.got {
    background: var(--nes-yellow);
    color: #1a1a1a;
    border-color: var(--nes-red);
    filter: none;
  }

  /* ========== NPC dialogue modal ========== */
  .npc-modal-back {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.78);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 220;
    padding: 20px;
  }
  .npc-modal-back.open { display: flex; }
  .npc-modal {
    background: var(--paper);
    color: #1a1a1a;
    border: 4px solid #1a1a1a;
    box-shadow: 8px 8px 0 var(--nes-red);
    padding: 24px;
    max-width: 560px;
    width: 100%;
    max-height: 86vh;
    overflow-y: auto;
    font-family: 'VT323', monospace;
    font-size: 22px;
    line-height: 1.5;
  }
  .npc-modal .speaker {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
    border-bottom: 3px dashed #1a1a1a;
    padding-bottom: 10px;
  }
  .npc-modal .speaker img {
    width: 56px; height: 56px;
    image-rendering: pixelated;
    border: 2px solid #1a1a1a;
    background: var(--paper-light);
  }
  .npc-modal .speaker .who {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: var(--nes-red);
  }
  .npc-modal .speaker .when {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: #666;
    margin-top: 2px;
  }
  .npc-modal .prompt { white-space: pre-wrap; margin-bottom: 16px; }
  .npc-modal .opts { display: flex; flex-direction: column; gap: 10px; }
  .npc-modal .opt {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 12px 16px;
    border: 3px solid #1a1a1a;
    background: #fff;
    color: #1a1a1a;
    cursor: pointer;
    text-align: left;
    box-shadow: 3px 3px 0 #1a1a1a;
    line-height: 1.6;
  }
  .npc-modal .opt:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--nes-red); }
  .npc-modal .opt:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 #1a1a1a; }
  .npc-modal .response {
    background: #1a1a1a;
    color: var(--nes-yellow);
    padding: 14px 16px;
    margin-top: 16px;
    border-left: 4px solid var(--nes-red);
    font-size: 20px;
    font-family: 'VT323', monospace;
    white-space: pre-wrap;
  }
  .npc-modal .badge-pop {
    margin-top: 14px;
    background: var(--nes-yellow);
    color: #1a1a1a;
    padding: 10px 14px;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    border: 3px solid #1a1a1a;
    box-shadow: 3px 3px 0 var(--nes-red);
    animation: badge-pop 0.4s ease-out;
  }
  @keyframes badge-pop {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .npc-modal .close-btn {
    margin-top: 16px;
    padding: 10px 18px;
    border: 3px solid #1a1a1a;
    background: var(--nes-yellow);
    color: #1a1a1a;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    cursor: pointer;
    box-shadow: 3px 3px 0 #1a1a1a;
  }

  /* ========== utility ========== */
  .hidden { display: none !important; }
  a { color: var(--nes-yellow); }

  /* ========== mobile / touch tweaks ========== */
  /* Hide desktop control hints on touch-only devices */
  @media (hover: none) and (pointer: coarse) {
    #title-scene .meta { display: none; }
  }

  /* Landscape mobile / short viewport — compact title screen so it fits without scroll */
  @media (max-height: 520px) {
    #title-scene { padding: 10px; gap: 0; }
    #title-mascot { width: 60px !important; margin-bottom: 4px !important; }
    #title-scene h1 { font-size: clamp(16px, 4vw, 28px); margin: 0 0 4px; }
    #title-scene .sub { font-size: 9px; margin: 0 0 8px; }
    .badges-row { gap: 8px; margin-bottom: 8px; }
    .badge { width: 36px; height: 36px; font-size: 16px; }
    #title-scene .stages {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 8px;
      max-width: 100%;
      width: 100%;
      padding: 4px 8px;
      margin-bottom: 8px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .stage-tile {
      flex: 0 0 auto;
      min-width: 110px;
      padding: 8px 6px;
      font-size: 9px;
      scroll-snap-align: center;
    }
    .stage-tile .num { font-size: 16px; margin-bottom: 2px; }
    #title-scene .start-btn { font-size: 11px; padding: 10px 18px; }
  }

  /* Portrait orientation warning — Mario-like games need landscape */
  #rotate-warn {
    position: fixed; inset: 0;
    background: #000;
    color: var(--nes-yellow);
    z-index: 999;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    line-height: 1.8;
  }
  #rotate-warn .icon {
    font-size: 64px;
    margin-bottom: 18px;
    animation: rotate-tip 2s infinite ease-in-out;
  }
  #rotate-warn .small {
    font-family: 'VT323', monospace;
    font-size: 18px;
    margin-top: 18px;
    color: #fff;
    line-height: 1.5;
  }
  @keyframes rotate-tip {
    0%, 100% { transform: rotate(-15deg); }
    50% { transform: rotate(75deg); }
  }
  /* Show only on portrait + touch */
  @media (orientation: portrait) and (hover: none) and (pointer: coarse) {
    #rotate-warn { display: flex; }
  }
</style>
</head>
<body>

<div id="marquee"><div class="track" id="marquee-track">載入中...</div></div>

<div id="rotate-warn">
  <div class="icon">📱</div>
  HAORIO 是橫向遊戲<br>
  把手機轉橫拿
  <div class="small">(像玩 Super Mario 那樣)</div>
</div>

<div id="loading">LOADING...</div>

<section id="title-scene">
  <img id="title-mascot" src="haohao-head-64.png" alt="H" style="width:120px;height:auto;image-rendering:pixelated;margin-bottom:14px;filter:drop-shadow(4px 4px 0 #1a1a1a);">
  <h1 id="title-name">HAOHAO.UNZIP</h1>
  <p class="sub" id="title-sub">HAORIO · 橫向捲軸</p>
  <div class="badges-row" id="badges-row"></div>
  <div class="stages" id="stage-grid"></div>
  <button class="start-btn" id="btn-continue">▶ 繼續</button>
  <div class="meta">
    ← → 移動 · ↑/空白 跳 · B/X 發射 · ESC 回標題<br>
    手機:左下搖桿 · 右下 A 跳 / B 射 · <a href="index.html">回經典版</a>
  </div>
</section>

<div id="stage-wrap" class="hidden">
  <canvas id="game" width="1024" height="576"></canvas>
</div>

<div id="hud" class="hidden">
  <div class="left">
    <span id="hud-stage">1-1</span>
    <span id="hud-title"></span>
  </div>
  <div class="middle">
    <span id="hud-badges"></span>
  </div>
  <div class="right">
    <span id="hud-coins">★ 0</span>
    <span id="hud-lives">♥ 10</span>
    <button id="hud-exit" title="回標題 (ESC)">✕</button>
  </div>
</div>

<div id="touch" class="hidden">
  <div class="touch-cluster">
    <div class="stick-base" id="stick-base">
      <div class="stick" id="stick"></div>
    </div>
  </div>
  <div class="touch-cluster">
    <div class="touch-btn" id="btn-fire" title="發射">B</div>
    <div class="touch-btn" id="btn-jump" title="跳">A</div>
  </div>
</div>

<div class="modal-back" id="modal">
  <div class="modal">
    <h2 id="modal-title"></h2>
    <div class="body" id="modal-body"></div>
    <div class="row" id="modal-row"></div>
  </div>
</div>

<div class="npc-modal-back" id="npc-modal">
  <div class="npc-modal">
    <div class="speaker">
      <img src="haohao-head-64.png" alt="H">
      <div>
        <div class="who" id="npc-who"></div>
        <div class="when" id="npc-when"></div>
      </div>
    </div>
    <div class="prompt" id="npc-prompt"></div>
    <div class="opts" id="npc-opts"></div>
    <div class="response hidden" id="npc-response"></div>
    <div class="badge-pop hidden" id="npc-badgepop"></div>

// =====================================================
// LOAD
// =====================================================
async function boot() {
  try {
    const res = await fetch('haorio-content.json?t=' + Date.now());
    content = await res.json();
  } catch (e) {
    $('loading').textContent = 'load fail: ' + e.message;
    return;
  }
  stages = content.world1.stages.map(s => ({
    ...s,
    tiles: parseLayout(s.layout)
  }));

  // Load progress
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    if (saved.cleared) progress.cleared = saved.cleared;
    if (saved.badges)  progress.badges = saved.badges;
    if (saved.coins) hud.coins = saved.coins;
    if (typeof saved.lastStage === 'number') progress.lastStage = saved.lastStage;
  } catch {}

  initMarquee();
  initInput();
  initBGM();
  $('loading').classList.add('hidden');
  showTitle();
  requestAnimationFrame(loop);
}

function parseLayout(rows) {
  // Returns 2D array [y][x] of chars
  const tiles = [];
  for (let y = 0; y < rows.length; y++) {
    const row = [];
    for (let x = 0; x < rows[y].length; x++) row.push(rows[y][x]);
    tiles.push(row);
  }
  return tiles;
}

function saveProgress() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({
      cleared: progress.cleared,
      badges: progress.badges,
      coins: hud.coins,
      lastStage: stageIdx
    }));
  } catch {}
}

// =====================================================
// MARQUEE
// =====================================================
function initMarquee() {
  if (!content.marquee || !content.marquee.enabled) {
    $('marquee').classList.add('hidden');

  }
  const items = content.marquee.items || [];
  const text = items.map(i => typeof i === 'string' ? i : (i.text || '')).join('   ✦   ');
  // duplicate so the loop has no gap
  $('marquee-track').textContent = text + '   ✦   ' + text;
}

// =====================================================
// BGM
// =====================================================
function initBGM() {
  if (!content.audio || !content.audio.bgm) return;
  bgmAudio = new Audio(content.audio.bgm);
  bgmAudio.loop = true;
  bgmAudio.volume = content.audio.bgmVolume || 0.4;
}
function startBGM() {
  if (!bgmAudio) return;
  bgmAudio.play().catch(() => { /* user gesture needed */ });
}
function stopBGM() {
  if (!bgmAudio) return;
  bgmAudio.pause();
}

// =====================================================
// INPUT
// =====================================================
function initInput() {
  window.addEventListener('keydown', e => {
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
    const k = e.key;
    // Title screen navigation
    if (scene === 'title') {
      if (k === 'ArrowLeft' || k === 'a') { titleSelect(-1); return; }
      if (k === 'ArrowRight' || k === 'd') { titleSelect(1); return; }
      if (k === 'Enter' || k === ' ') { startStage(selectedStageIdx); return; }
      return;
    }
    // Playing
    if (k === 'ArrowLeft' || k === 'a') keys.left = true;
    if (k === 'ArrowRight' || k === 'd') keys.right = true;
    if (k === 'ArrowUp' || k === 'w' || k === ' ') keys.jump = true;
    if (k === 'b' || k === 'B' || k === 'x' || k === 'X') keys.fire = true;
    if (k === 'Escape' && scene === 'playing') goTitle();
  });
  window.addEventListener('keyup', e => {
    const k = e.key;
    if (k === 'ArrowLeft' || k === 'a') keys.left = false;
    if (k === 'ArrowRight' || k === 'd') keys.right = false;
    if (k === 'ArrowUp' || k === 'w' || k === ' ') keys.jump = false;
    if (k === 'b' || k === 'B' || k === 'x' || k === 'X') keys.fire = false;
  });

  // ---- Touch buttons (Pointer Events + setPointerCapture)
  bindButton('btn-jump', 'jump');
  bindButton('btn-fire', 'fire');

  // ---- Joystick
  bindJoystick();

  // ---- HUD exit button
  const exitBtn = $('hud-exit');
  if (exitBtn) {
    exitBtn.addEventListener('click', () => {
      if (scene === 'playing') goTitle();
    });
  }
}

// Binds an on-screen button to a touchKeys flag using Pointer Events.
// Pointer Events + setPointerCapture guarantees we get the up/cancel
// even if the finger slides off the element — fixes stuck-key bug.
function bindButton(id, action) {
  const el = $(id);
  if (!el) return;
  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    try { el.setPointerCapture(e.pointerId); } catch {}
    touchKeys[action] = true;
    el.classList.add('active');
  });
  const release = e => {
    touchKeys[action] = false;
    el.classList.remove('active');
  };
  el.addEventListener('pointerup', release);
  el.addEventListener('pointercancel', release);
  el.addEventListener('lostpointercapture', release);
  // Failsafe: if pointer leaves while NOT captured (rare), clear too
  el.addEventListener('pointerleave', e => {
    if (!el.hasPointerCapture || !el.hasPointerCapture(e.pointerId)) release();
  });
}

function bindJoystick() {
  const base = $('stick-base');
  const stick = $('stick');
  if (!base || !stick) return;
  const STICK_MAX = 38;        // px from center
  const DEADZONE = 8;          // px from center counts as no input
  let activeId = null;
  let centerX = 0, centerY = 0;

  function start(e) {
    e.preventDefault();
    if (activeId !== null) return; // ignore second finger
    activeId = e.pointerId;
    try { base.setPointerCapture(e.pointerId); } catch {}
    const rect = base.getBoundingClientRect();
    centerX = rect.left + rect.width / 2;
    centerY = rect.top + rect.height / 2;
    stick.classList.add('dragging');
    move(e);
  }
  function move(e) {
    if (e.pointerId !== activeId) return;
    let dx = e.clientX - centerX;
    let dy = e.clientY - centerY;
    const dist = Math.hypot(dx, dy);
    if (dist > STICK_MAX) {
      dx = dx / dist * STICK_MAX;
      dy = dy / dist * STICK_MAX;
    }
    stick.style.transform = `translate(${dx}px, ${dy}px)`;
    // Joystick: in title scene any direction switches stage; in game only x is L/R.
    if (scene === 'title') {
      // Pick dominant axis. Up / Left = prev, Down / Right = next.
      const usingY = Math.abs(dy) > Math.abs(dx);
      const main = usingY ? dy : dx;
      if (Math.abs(main) < DEADZONE) {
        touchKeys.left = false;
        touchKeys.right = false;
      } else if (main < 0) {
        touchKeys.left = true;   // up or left → prev
        touchKeys.right = false;
      } else {
        touchKeys.right = true;  // down or right → next
        touchKeys.left = false;
      }
    } else {
      // In-game: X for move, +Y for crouch.
      if (Math.abs(dx) < DEADZONE) {
        touchKeys.left = false;
        touchKeys.right = false;
      } else if (dx < 0) {
        touchKeys.left = true;
        touchKeys.right = false;
      } else {
        touchKeys.right = true;
        touchKeys.left = false;
      }
    }
  }
  function end(e) {
    if (e.pointerId !== activeId) return;
    activeId = null;
    stick.style.transform = 'translate(0, 0)';
    stick.classList.remove('dragging');
    touchKeys.left = false;
    touchKeys.right = false;
  }

  base.addEventListener('pointerdown', start);
  base.addEventListener('pointermove', move);
  base.addEventListener('pointerup', end);
  base.addEventListener('pointercancel', end);
  base.addEventListener('lostpointercapture', () => {
    activeId = null;
    stick.style.transform = 'translate(0, 0)';
    stick.classList.remove('dragging');
    touchKeys.left = false;
    touchKeys.right = false;
  });
}

function getInput() {
  return {
    left: keys.left || touchKeys.left,
    right: keys.right || touchKeys.right,
    jump: keys.jump || touchKeys.jump,
    fire: keys.fire || touchKeys.fire
  };
}

// =====================================================
// TITLE / STAGE SELECT
// =====================================================
function showTitle() {
  scene = 'title';
  $('title-scene').classList.add('active');
  $('stage-wrap').classList.add('hidden');
  $('hud').classList.add('hidden');
  // Show touch controls on title too (joystick = stage select)
  $('touch').classList.remove('hidden');
  $('title-name').textContent = (content.meta.worldName || 'HAOHAO.UNZIP').toUpperCase();
  $('title-sub').textContent = content.meta.subtitle || 'HAORIO 版';
  renderTitleBadges();

  // Default selectedStageIdx = last played
  selectedStageIdx = Math.min(progress.lastStage || 0, stages.length - 1);
  renderStageGrid();

  const btn = $('btn-continue');
  btn.textContent = (progress.cleared.length > 0 ? '▶ 繼續 ' : '▶ 開始 ') + (stages[selectedStageIdx]?.id || '1-1');
  btn.onclick = () => startStage(selectedStageIdx);
  stopBGM();

  // Wire title-screen joystick + A button (override game behavior on title)
  // The joystick already updates touchKeys; we poll it via titleStickPoll.
  startTitleStickPoll();
}

// Title-screen joystick polling: when scene === 'title', if touchKeys.left/right
// transitions from false → true, fire titleSelect once. A button = enter.
let _titleStickPrev = { left: false, right: false, jump: false, fire: false };
let _titleStickRAF = null;
function startTitleStickPoll() {
  cancelAnimationFrame(_titleStickRAF);
  function tick() {
    if (scene !== 'title') { _titleStickPrev = { left: false, right: false, jump: false, fire: false }; return; }
    if (touchKeys.left && !_titleStickPrev.left) titleSelect(-1);
    if (touchKeys.right && !_titleStickPrev.right) titleSelect(1);
    if ((touchKeys.jump && !_titleStickPrev.jump) || (touchKeys.fire && !_titleStickPrev.fire)) {
      startStage(selectedStageIdx);
      return;
    }
    _titleStickPrev = { left: touchKeys.left, right: touchKeys.right, jump: touchKeys.jump, fire: touchKeys.fire };
    _titleStickRAF = requestAnimationFrame(tick);
  }
  _titleStickRAF = requestAnimationFrame(tick);
}

function renderStageGrid() {
  const grid = $('stage-grid');
  grid.innerHTML = '';
  stages.forEach((s, i) => {
    const tile = document.createElement('div');
    tile.className = 'stage-tile' + (progress.cleared.includes(s.id) ? ' cleared' : '') + (i === selectedStageIdx ? ' selected' : '');
    tile.innerHTML = `<span class="num">${s.id}</span>${s.title || ''}`;
    tile.onclick = () => { selectedStageIdx = i; startStage(i); };
    grid.appendChild(tile);
  });
}

// Title screen left/right navigation. dir = -1 or +1.
function titleSelect(dir) {
  selectedStageIdx = (selectedStageIdx + dir + stages.length) % stages.length;
  renderStageGrid();
  // also update continue button label
  const btn = $('btn-continue');
  if (btn) btn.textContent = '▶ 開始 ' + stages[selectedStageIdx].id;
}

function goTitle() {
  showTitle();
}

// =====================================================
// STAGE START
// =====================================================
function startStage(idx) {
  if (idx < 0 || idx >= stages.length) return;
  stageIdx = idx;
  // reset stage tiles (re-parse so question blocks reset)
  stages[idx].tiles = parseLayout(stages[idx].layout);
  // spawn player
  player = makePlayer(80, 200);
  // spawn enemies from G/K tiles + NPC from N tile
  enemies = [];
  npcs = [];
  bullets = [];
  fireCooldown = 0;
  const stage = stages[idx];
  for (let ty = 0; ty < stage.tiles.length; ty++) {
    for (let tx = 0; tx < stage.tiles[ty].length; tx++) {
      const c = stage.tiles[ty][tx];
      if (c === 'G') {
        enemies.push(makeGoomba(tx * TILE, ty * TILE));
        stage.tiles[ty][tx] = '.';
      } else if (c === 'K') {
        enemies.push(makeKoopa(tx * TILE, ty * TILE));
        stage.tiles[ty][tx] = '.';
      } else if (c === 'N') {
        if (stage.npc) {
          npcs.push(makeNpc(tx * TILE, ty * TILE, stage.npc));
        }
        stage.tiles[ty][tx] = '.';
      }
    }
  }
  particles = [];
  camera.x = 0;
  scene = 'playing';
  $('title-scene').classList.remove('active');
  $('stage-wrap').classList.remove('hidden');
  $('hud').classList.remove('hidden');
  $('touch').classList.remove('hidden');
  $('hud-stage').textContent = stage.id;
  $('hud-title').textContent = stage.title || '';
  $('hud-coins').textContent = '★ ' + hud.coins;
  $('hud-lives').textContent = '♥ ' + hud.lives;
  renderHudBadges();
  saveProgress();
  startBGM();
}

function makePlayer(x, y) {
  return {
    x, y, w: 24, h: 44,
    vx: 0, vy: 0,
    grounded: false,
    facing: 1,
    dead: false,
    deathTimer: 0,
    canBumpBlocks: true,
    invuln: 0
  };
}
function makeGoomba(x, y) {
  return {
    x: x + 4, y: y + 8, w: 24, h: 24,
    vx: -1, vy: 0,
    grounded: false,
    facing: -1,
    bumpOnWall: true,
    dead: false,
    deathTimer: 0,
    type: 'goomba'
  };
}
function makeNpc(x, y, data) {
  return {
    x: x + 4, y: y - 4, w: 24, h: 36,
    bobPhase: Math.random() * Math.PI * 2,
    data: data,
    triggered: false  // resets each stage start
  };
}
function makeKoopa(x, y) {
  return {
    x: x + 4, y: y, w: 24, h: 32,
    vx: -0.8, vy: 0,
    grounded: false,
    facing: -1,
    bumpOnWall: true,
    dead: false,
    deathTimer: 0,
    type: 'koopa',
    state: 'walk',  // walk | shell | sliding
    shellTimer: 0
  };
}

// =====================================================
// TILE / COLLISION HELPERS
// =====================================================
function tileAt(stage, tx, ty) {
  if (ty < 0 || ty >= stage.tiles.length) return '.';
  const row = stage.tiles[ty];
  if (!row || tx < 0 || tx >= row.length) return '.';
  return row[tx];
}
function isSolid(c) {
  return c === '#' || c === 'B' || c === '?' || c === 'X';
}
function moveAndCollide(entity, stage) {
  // Horizontal
  entity.x += entity.vx;
  if (entity.vx > 0) {
    const tx = Math.floor((entity.x + entity.w - 1) / TILE);
    const yStart = Math.floor(entity.y / TILE);
    const yEnd = Math.floor((entity.y + entity.h - 1) / TILE);
    for (let ty = yStart; ty <= yEnd; ty++) {
      if (isSolid(tileAt(stage, tx, ty))) {
        entity.x = tx * TILE - entity.w;
        entity.vx = 0;
        if (entity.bumpOnWall) entity.facing = -1;
        break;
      }
    }
  } else if (entity.vx < 0) {
    const tx = Math.floor(entity.x / TILE);
    const yStart = Math.floor(entity.y / TILE);
    const yEnd = Math.floor((entity.y + entity.h - 1) / TILE);
    for (let ty = yStart; ty <= yEnd; ty++) {
      if (isSolid(tileAt(stage, tx, ty))) {
        entity.x = (tx + 1) * TILE;
        entity.vx = 0;
        if (entity.bumpOnWall) entity.facing = 1;
        break;
      }
    }
  }

  // Vertical
  entity.y += entity.vy;
  entity.grounded = false;
  if (entity.vy > 0) {
    const ty = Math.floor((entity.y + entity.h - 1) / TILE);
    const xStart = Math.floor(entity.x / TILE);
    const xEnd = Math.floor((entity.x + entity.w - 1) / TILE);
    for (let tx = xStart; tx <= xEnd; tx++) {
      if (isSolid(tileAt(stage, tx, ty))) {
        entity.y = ty * TILE - entity.h;
        entity.vy = 0;
        entity.grounded = true;
        break;
      }
    }
  } else if (entity.vy < 0) {
    const ty = Math.floor(entity.y / TILE);
    const xStart = Math.floor(entity.x / TILE);
    const xEnd = Math.floor((entity.x + entity.w - 1) / TILE);
    for (let tx = xStart; tx <= xEnd; tx++) {
      const c = tileAt(stage, tx, ty);
      if (isSolid(c)) {
        entity.y = (ty + 1) * TILE;
        entity.vy = 0;
        if (c === '?' && entity.canBumpBlocks) bumpBlock(stage, tx, ty);
        else if (c === 'B' && entity.canBumpBlocks) breakBrick(stage, tx, ty);
        break;
      }
    }
  }
}
function overlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function bumpBlock(stage, tx, ty) {
  stage.tiles[ty][tx] = 'X';
  const msgs = stages[stageIdx].questionBlockContent || ['+1'];
  const msg = msgs[Math.floor(Math.random() * msgs.length)];
  spawnParticle(tx * TILE + TILE/2, ty * TILE - 6, msg, '#ffe000');
  hud.coins++;
  $('hud-coins').textContent = '★ ' + hud.coins;
  saveProgress();
}

function breakBrick(stage, tx, ty) {
  stage.tiles[ty][tx] = '.';
  const color = stages[stageIdx].brickColor || '#a06030';
  // 4 chunks flying out
  for (let i = 0; i < 4; i++) {
    spawnParticle(
      tx * TILE + (i % 2 ? 22 : 6),
      ty * TILE + (i < 2 ? 6 : 22),
      '■',
      color
    );
  }
  spawnParticle(tx * TILE + TILE/2, ty * TILE - 6, '+10', '#fff');
  hud.coins++;
  $('hud-coins').textContent = '★ ' + hud.coins;
}

function killEnemy(e) {
  e.dead = true;
  e.deathTimer = 30;
  spawnParticle(e.x + e.w/2, e.y - 4, '+50', '#ffe000');
}

// =====================================================
// BULLETS
// =====================================================
function fireBullet() {
  if (fireCooldown > 0 || !player || player.dead || modalOpen) return;
  bullets.push({
    x: player.x + (player.facing > 0 ? player.w : -10),
    y: player.y + 18,
    w: 10, h: 10,
    vx: player.facing * 8.5,
    life: 70
  });
  fireCooldown = 14;
}

function updateBullets() {
  if (fireCooldown > 0) fireCooldown--;
  const stage = stages[stageIdx];
  for (const b of bullets) {
    b.x += b.vx;
    b.life--;
    // Off-camera cull
    if (b.x < camera.x - 100 || b.x > camera.x + GAME_W + 100) { b.life = 0; continue; }
    // Tile collision
    const tx = Math.floor((b.x + b.w/2) / TILE);
    const ty = Math.floor((b.y + b.h/2) / TILE);
    const c = tileAt(stage, tx, ty);
    if (c === '#' || c === 'X') {
      b.life = 0;
    } else if (c === 'B') {
      breakBrick(stage, tx, ty);
      b.life = 0;
    } else if (c === '?') {
      bumpBlock(stage, tx, ty);
      b.life = 0;
    }
    // Enemy collision
    for (const e of enemies) {
      if (e.dead) continue;
      if (overlap(b, e)) {
        killEnemy(e);
        b.life = 0;
        break;
      }
    }
  }
  bullets = bullets.filter(b => b.life > 0);
}

function drawBullets() {
  for (const b of bullets) {
    const px = Math.round(b.x - camera.x);
    const py = Math.round(b.y);
    // outer flicker
    ctx.fillStyle = (Math.floor(performance.now() / 60) % 2) ? '#ff8800' : '#ffe000';
    ctx.fillRect(px, py, b.w, b.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(px + 3, py + 3, 4, 4);
  }
}

function spawnParticle(x, y, text, color) {
  particles.push({ x, y, text, color, life: 90, vy: -1.2 });
}

// =====================================================
// UPDATE
// =====================================================
function updatePlayer() {
  if (modalOpen) return;
  const phys = content.physics;
  const stage = stages[stageIdx];
  const inp = getInput();

  if (player.dead) {
    player.deathTimer--;
    player.vy += phys.gravity * 0.6;
    player.y += player.vy;
    if (player.deathTimer <= 0) {
      hud.lives--;
      $('hud-lives').textContent = '♥ ' + hud.lives;
      if (hud.lives <= 0) {
        hud.lives = 10;
        $('hud-lives').textContent = '♥ 10';
        goTitle();
        return;
      }
      respawnPlayer();
    }
    return;
  }

  // Horizontal
  let ax = 0;
  if (inp.left) ax -= 1;
  if (inp.right) ax += 1;
  if (ax !== 0) {
    player.vx = ax * phys.moveSpeed;
    player.facing = ax;
  } else {
    player.vx *= phys.friction;
    if (Math.abs(player.vx) < 0.1) player.vx = 0;
  }

  // Jump
  if (inp.jump && player.grounded) {
    player.vy = phys.jumpVelocity;
    player.grounded = false;
  }

  // Fire bullet (B / X / on-screen B button)
  if (inp.fire) fireBullet();

  // Gravity
  player.vy += phys.gravity;
  if (player.vy > phys.maxFallSpeed) player.vy = phys.maxFallSpeed;

  // Move
  moveAndCollide(player, stage);

  // Fall off bottom
  if (player.y > GAME_H + 100) {
    killPlayer();
    return;
  }

  // Enemy collision
  // Lenient stomp: while falling at all (vy > 0.5), ANY contact = stomp.
  // Fixes "two enemies stuck together, you stomp one but the second hits you."
  // Also: after a stomp, brief invuln so the next adjacent enemy doesn't insta-kill.
  if (player.invuln > 0) player.invuln--;
  for (const e of enemies) {
    if (e.dead) continue;
    if (overlap(player, e)) {
      const isStomp = player.vy > 0.5;  // falling = stomp, no positional check
      if (e.type === 'koopa') {
        if (e.state === 'walk') {
          if (isStomp) {
            e.state = 'shell';
            e.shellTimer = 240;
            e.h = 22;
            e.y += 10;
            e.vx = 0;
            player.vy = phys.jumpVelocity * 0.6;
            player.invuln = 18;
            spawnParticle(e.x + e.w/2, e.y - 4, '殼!', '#3aa040');
          } else if (player.invuln === 0) {
            killPlayer();
            return;
          }
        } else if (e.state === 'shell') {
          const dir = (player.x + player.w/2) < (e.x + e.w/2) ? 1 : -1;
          e.state = 'sliding';
          e.vx = dir * 6;
          player.invuln = 18;
          spawnParticle(e.x + e.w/2, e.y - 4, '踢!', '#ffe000');
          if (isStomp) player.vy = phys.jumpVelocity * 0.6;
          else player.x -= dir * 4;
        } else if (e.state === 'sliding') {
          if (isStomp) {
            e.state = 'shell';
            e.shellTimer = 240;
            e.vx = 0;
            player.vy = phys.jumpVelocity * 0.6;
            player.invuln = 18;
          } else if (player.invuln === 0) {
            killPlayer();
            return;
          }
        }
      } else {
        // Goomba (default)
        if (isStomp) {
          e.dead = true;
          e.deathTimer = 20;
          player.vy = phys.jumpVelocity * 0.6;
          player.invuln = 18;  // prevents adjacent Goomba killing on the same frame
          spawnParticle(e.x + e.w/2, e.y - 4, '+50', '#fff');
        } else if (player.invuln === 0) {
          killPlayer();
          return;
        }
      }
    }
  }

  // NPC overlap → trigger dialogue (once per stage entry)
  for (const n of npcs) {
    if (n.triggered) continue;
    if (overlap(player, n)) {
      n.triggered = true;
      openNpcDialogue(n);
      return;
    }
  }

  // Flagpole
  for (let ty = 0; ty < stage.tiles.length; ty++) {
    for (let tx = 0; tx < stage.tiles[ty].length; tx++) {
      if (stage.tiles[ty][tx] === 'F') {
        const fx = tx * TILE, fy = ty * TILE;
        if (player.x + player.w > fx && player.x < fx + TILE) {
          // Check vertical overlap with flagpole height (4 tiles up)
          const poleTop = fy - TILE * 3;
          if (player.y + player.h > poleTop && player.y < fy + TILE) {
            triggerStageEnd();
            return;
          }
        }
      }
    }
  }
}

function killPlayer() {
  player.dead = true;
  player.deathTimer = 60;
  player.vy = -10;
  player.vx = 0;
  spawnParticle(player.x + player.w/2, player.y, 'KO', '#fff');
}
function respawnPlayer() {
  player = makePlayer(80, 200);
  camera.x = 0;
}

function updateEnemy(e) {
  if (e.dead) {
    e.deathTimer--;
    return;
  }
  // Don't update if off-camera (left of camera by 200px)
  if (e.x < camera.x - 200 || e.x > camera.x + GAME_W + 400) {
    return;
  }

  // Koopa shell logic
  if (e.type === 'koopa') {
    if (e.state === 'shell') {
      e.shellTimer--;
      e.vx = 0;
      // wakes up after 5 sec
      if (e.shellTimer <= 0) {
        e.state = 'walk';
        e.h = 32;
      }
    } else if (e.state === 'sliding') {
      // shell flies fast, kills other enemies on impact
      const oldVx = e.vx;
      e.bumpOnWall = false;
      e.vy += content.physics.gravity;
      if (e.vy > content.physics.maxFallSpeed) e.vy = content.physics.maxFallSpeed;
      // wall bounce: if moveAndCollide stops vx, reverse
      moveAndCollide(e, stages[stageIdx]);
      if (e.vx === 0 && oldVx !== 0) e.vx = -oldVx;
      // hit other enemies
      for (const other of enemies) {
        if (other === e || other.dead) continue;
        if (overlap(e, other)) {
          killEnemy(other);
        }
      }
      return;
    } else {
      // walk
      e.vx = e.facing * 0.8;
      // edge reverse
      if (e.grounded) {
        const aheadX = e.facing > 0 ? e.x + e.w + 2 : e.x - 2;
        const belowY = e.y + e.h + 4;
        const tx = Math.floor(aheadX / TILE);
        const ty = Math.floor(belowY / TILE);
        if (!isSolid(tileAt(stages[stageIdx], tx, ty))) {
          e.facing *= -1;
        }
      }
      e.bumpOnWall = true;
    }
    e.vy += content.physics.gravity;
    if (e.vy > content.physics.maxFallSpeed) e.vy = content.physics.maxFallSpeed;
    moveAndCollide(e, stages[stageIdx]);
    return;
  }

  // Goomba (default)
  e.vx = e.facing * 1.0;
  e.vy += content.physics.gravity;
  if (e.vy > content.physics.maxFallSpeed) e.vy = content.physics.maxFallSpeed;
  if (e.grounded) {
    const aheadX = e.facing > 0 ? e.x + e.w + 2 : e.x - 2;
    const belowY = e.y + e.h + 4;
    const tx = Math.floor(aheadX / TILE);
    const ty = Math.floor(belowY / TILE);
    if (!isSolid(tileAt(stages[stageIdx], tx, ty))) {
      e.facing *= -1;
    }
  }
  moveAndCollide(e, stages[stageIdx]);
}

function updateParticles() {
  for (const p of particles) {
    p.y += p.vy;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);
}

function updateCamera() {
  if (!player) return;
  const targetX = player.x - GAME_W / 2 + player.w / 2;
  camera.x += (targetX - camera.x) * 0.18;
  if (camera.x < 0) camera.x = 0;
  const stage = stages[stageIdx];
  const stageWidth = (stage.tiles[0]?.length || 80) * TILE;
  const maxX = stageWidth - GAME_W;
  if (camera.x > maxX) camera.x = maxX;
}

// =====================================================
// STAGE END / MODAL
// =====================================================
function triggerStageEnd() {
  if (modalOpen) return;
  const stage = stages[stageIdx];
  if (!progress.cleared.includes(stage.id)) {
    progress.cleared.push(stage.id);
    saveProgress();
  }
  spawnParticle(player.x + player.w/2, player.y, stage.endText || 'CLEAR', '#ffe000');
  setTimeout(() => {
    showStageClearModal();
  }, 500);
}

function showStageClearModal() {
  const stage = stages[stageIdx];
  $('modal-title').textContent = stage.endModalTitle || stage.title || 'CLEAR';
  $('modal-body').textContent = stage.endModalBody || '';
  const row = $('modal-row');
  row.innerHTML = '';
  // Continue to next stage button
  const isLast = stageIdx >= stages.length - 1;
  if (!isLast) {
    const next = document.createElement('button');
    next.textContent = stage.endModalCta || ('▶ 下一關 ' + stages[stageIdx + 1].id);
    next.onclick = () => { closeModal(); startStage(stageIdx + 1); };
    row.appendChild(next);
  } else {
    const end = document.createElement('button');
    end.textContent = (content.endgame && content.endgame.ctaLabel) || '▶ 結算';
    end.onclick = () => { closeModal(); showEndgame(); };
    row.appendChild(end);
  }
  // Back to title
  const back = document.createElement('button');
  back.className = 'secondary';
  back.textContent = '↑ 回標題';
  back.onclick = () => { closeModal(); goTitle(); };
  row.appendChild(back);
  openModal();
}

function showEndgame() {
  const eg = content.endgame || {};
  $('modal-title').textContent = eg.title || '🎮 GAME CLEAR';
  $('modal-body').textContent = eg.body || 'Thank you for playing!';
  const row = $('modal-row');
  row.innerHTML = '';
  if (eg.ctaUrl) {
    const cta = document.createElement('button');
    cta.textContent = eg.ctaLabel || '▶ 繼續';
    cta.onclick = () => window.location.href = eg.ctaUrl;
    row.appendChild(cta);
  }
  const back = document.createElement('button');
  back.className = 'secondary';
  back.textContent = '↑ 回標題';
  back.onclick = () => { closeModal(); goTitle(); };
  row.appendChild(back);
  openModal();
}

function openModal() {
  modalOpen = true;
  $('modal').classList.add('open');
}
function closeModal() {
  modalOpen = false;
  $('modal').classList.remove('open');
}

// =====================================================
// NPC DIALOGUE
// =====================================================
function openNpcDialogue(n) {
  activeNpc = n;
  dialogueOpen = true;
  modalOpen = true;
  const data = n.data;
  $('npc-who').textContent = data.name || 'NPC';
  $('npc-when').textContent = data.yearTag || '';
  $('npc-prompt').textContent = data.prompt || '';
  $('npc-response').classList.add('hidden');
  $('npc-response').textContent = '';
  $('npc-badgepop').classList.add('hidden');
  $('npc-badgepop').textContent = '';
  $('npc-close').classList.add('hidden');
  const opts = $('npc-opts');
  opts.innerHTML = '';
  opts.classList.remove('hidden');
  (data.options || []).forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = (String.fromCharCode(65 + i)) + ' · ' + (opt.label || '');
    btn.onclick = () => npcChoose(opt);
    opts.appendChild(btn);
  });
  $('npc-modal').classList.add('open');
}

function npcChoose(opt) {
  $('npc-opts').classList.add('hidden');
  const resp = $('npc-response');
  resp.textContent = opt.response || '';
  resp.classList.remove('hidden');
  // Award badge
  const data = activeNpc && activeNpc.data;
  if (data && data.badgeId && !progress.badges.includes(data.badgeId)) {
    progress.badges.push(data.badgeId);
    saveProgress();
    const pop = $('npc-badgepop');
    pop.textContent = data.badgeUnlockMsg || ('★ 徽章 GET');
    pop.classList.remove('hidden');
    renderHudBadges();
  }
  $('npc-close').classList.remove('hidden');
}

$('npc-close').addEventListener('click', () => closeNpcDialogue());
$('npc-modal').addEventListener('click', (e) => {
  if (e.target.id === 'npc-modal') closeNpcDialogue();
});

function closeNpcDialogue() {
  dialogueOpen = false;
  modalOpen = false;
  activeNpc = null;
  $('npc-modal').classList.remove('open');
}

// =====================================================
// BADGES
// =====================================================
function renderHudBadges() {
  const all = (content && content.badges) || [];
  const got = progress.badges || [];
  const html = all.map(b => {
    const isGot = got.includes(b.id);
    return `<span class="b ${isGot ? 'got' : ''}" title="${b.label || ''}">${b.icon || '·'}</span>`;
  }).join('');
  $('hud-badges').innerHTML = html;
}

function renderTitleBadges() {
  const box = $('badges-row');
  if (!box) return;
  const all = (content && content.badges) || [];
  const got = progress.badges || [];
  box.innerHTML = '';
  all.forEach(b => {
    const isGot = got.includes(b.id);
    const div = document.createElement('div');
    div.className = 'badge' + (isGot ? ' got' : '');
    div.title = b.label || '';
    div.innerHTML = (b.icon || '·');
    box.appendChild(div);
  });
}

// =====================================================
// RENDER
// =====================================================
function render() {
  if (scene !== 'playing') return;
  const stage = stages[stageIdx];

  // bg
  ctx.fillStyle = stage.bgColor || '#5c94fc';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // clouds (parallax)
  drawClouds();
  drawHills(stage);

  // tiles
  drawTiles(stage);

  // enemies
  for (const e of enemies) drawEnemy(e);

  // NPCs
  for (const n of npcs) drawNpc(n);

  // player
  drawPlayer();

  // particles
  drawBullets();
  for (const p of particles) drawParticle(p);
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  const cloudOffset = (camera.x * 0.3) % 400;
  for (let i = -1; i < 4; i++) {
    const cx = i * 400 - cloudOffset + 80;
    drawCloud(cx, 60);
    drawCloud(cx + 220, 100);
  }
}
function drawCloud(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 16, 0, Math.PI * 2);
  ctx.arc(x + 18, y - 4, 18, 0, Math.PI * 2);
  ctx.arc(x + 36, y, 16, 0, Math.PI * 2);
  ctx.arc(x + 14, y + 8, 12, 0, Math.PI * 2);
  ctx.fill();
}
function drawHills(stage) {
  const hillColor = shade(stage.bgColor || '#5c94fc', -30);
  ctx.fillStyle = hillColor;
  const off = (camera.x * 0.5) % 360;
  for (let i = -1; i < 4; i++) {
    const hx = i * 360 - off;
    ctx.beginPath();
    ctx.moveTo(hx, GAME_H - 80);
    ctx.quadraticCurveTo(hx + 180, GAME_H - 220, hx + 360, GAME_H - 80);
    ctx.lineTo(hx + 360, GAME_H);
    ctx.lineTo(hx, GAME_H);
    ctx.fill();
  }
}
function shade(hex, amt) {
  // simple hex shade
  const m = hex.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
  if (!m) return hex;
  let r = parseInt(m[1], 16) + amt, g = parseInt(m[2], 16) + amt, b = parseInt(m[3], 16) + amt;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return `rgb(${r},${g},${b})`;
}

function drawTiles(stage) {
  const startX = Math.max(0, Math.floor(camera.x / TILE) - 1);
  const endX = Math.min(stage.tiles[0].length, startX + Math.ceil(GAME_W / TILE) + 2);
  for (let ty = 0; ty < stage.tiles.length; ty++) {
    for (let tx = startX; tx < endX; tx++) {
      const c = stage.tiles[ty][tx];
      if (!c || c === '.') continue;
      const px = Math.round(tx * TILE - camera.x);
      const py = ty * TILE;
      if (c === '#') drawGround(px, py, stage.groundColor);
      else if (c === 'B') drawBrick(px, py, stage.brickColor);
      else if (c === '?') drawQuestion(px, py);
      else if (c === 'X') drawUsedBlock(px, py);
      else if (c === 'F') drawFlag(px, py, ty, tx, stage);
    }
  }
}

function drawGround(px, py, color) {
  ctx.fillStyle = color || '#c84c0c';
  ctx.fillRect(px, py, TILE, TILE);
  ctx.fillStyle = shade(color || '#c84c0c', 30);
  ctx.fillRect(px, py, TILE, 4);
  ctx.fillStyle = shade(color || '#c84c0c', -30);
  ctx.fillRect(px, py + TILE - 4, TILE, 4);
  ctx.fillRect(px, py, 4, TILE);
}
function drawBrick(px, py, color) {
  ctx.fillStyle = color || '#a06030';
  ctx.fillRect(px, py, TILE, TILE);
  ctx.fillStyle = shade(color || '#a06030', -40);
  ctx.fillRect(px, py + 14, TILE, 2);
  ctx.fillRect(px + 14, py, 2, 14);
  ctx.fillRect(px + 6, py + 16, 2, 14);
  ctx.fillRect(px + 22, py + 16, 2, 14);
  ctx.fillStyle = shade(color || '#a06030', 30);
  ctx.fillRect(px, py, TILE, 2);
  ctx.fillRect(px, py, 2, TILE);
}
function drawQuestion(px, py) {
  // Animated yellow ? block
  const t = Math.floor(performance.now() / 200) % 2;
  ctx.fillStyle = t === 0 ? '#ffe000' : '#fdb000';
  ctx.fillRect(px, py, TILE, TILE);
  ctx.fillStyle = '#7a4a00';
  ctx.fillRect(px, py, TILE, 3);
  ctx.fillRect(px, py + TILE - 3, TILE, 3);
  ctx.fillRect(px, py, 3, TILE);
  ctx.fillRect(px + TILE - 3, py, 3, TILE);
  // ? mark
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', px + TILE/2, py + TILE/2 + 1);
  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';
}
function drawUsedBlock(px, py) {
  ctx.fillStyle = '#7a4a00';
  ctx.fillRect(px, py, TILE, TILE);
  ctx.fillStyle = shade('#7a4a00', -20);
  ctx.fillRect(px, py + TILE - 4, TILE, 4);
  ctx.fillRect(px, py, TILE, 3);
}
function drawFlag(px, py, ty, tx, stage) {
  // Pole goes up from this tile
  const poleH = TILE * 4;
  ctx.fillStyle = '#aaa';
  ctx.fillRect(px + TILE/2 - 2, py - poleH, 4, poleH + TILE);
  // top ball
  ctx.fillStyle = '#fcd000';
  ctx.beginPath();
  ctx.arc(px + TILE/2, py - poleH, 6, 0, Math.PI * 2);
  ctx.fill();
  // flag waving
  const wave = Math.sin(performance.now() / 300) * 3;
  ctx.fillStyle = '#d82800';
  ctx.beginPath();
  ctx.moveTo(px + TILE/2 + 2, py - poleH + 4);
  ctx.lineTo(px + TILE/2 + 28 + wave, py - poleH + 14);
  ctx.lineTo(px + TILE/2 + 2, py - poleH + 24);
  ctx.fill();
  // base
  ctx.fillStyle = '#666';
  ctx.fillRect(px, py, TILE, 6);
}

function drawSprite(rows, palette, px, py, scale, flipH) {
  const w = rows[0].length;
  for (let y = 0; y < rows.length; y++) {
    for (let x = 0; x < rows[y].length; x++) {
      const c = rows[y][x];
      if (c === '.' || c === ' ') continue;
      const color = palette[c];
      if (!color) continue;
      ctx.fillStyle = color;
      const dx = flipH ? px + (w - 1 - x) * scale : px + x * scale;
      ctx.fillRect(Math.round(dx), Math.round(py + y * scale), scale, scale);
    }
  }
}

function drawPlayer() {
  if (!player) return;
  const px = Math.round(player.x - camera.x);
  const py = Math.round(player.y);
  const bob = (Math.abs(player.vx) > 0.5 && player.grounded)
    ? Math.floor(performance.now() / 120) % 2
    : 0;
  if (player.invuln > 0 && player.invuln % 4 < 2) return;
  const spriteW = 16 * 2;
  const spriteH = 24 * 2;
  const offsetX = (player.w - spriteW) / 2;
  const offsetY = (player.h - spriteH);
  drawSprite(PLAYER_SPRITE, playerPalette(), px + offsetX, py + offsetY - bob, 2, player.facing < 0);
}

function drawEnemy(e) {
  if (e.dead) {
    const px = Math.round(e.x - camera.x);
    const py = Math.round(e.y + e.h / 2);
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(px - 4, py, e.w + 8, e.h / 2);
    return;
  }
  const px = Math.round(e.x - camera.x);
  const py = Math.round(e.y);
  if (e.type === 'koopa') {
    if (e.state === 'walk') {
      // 12x16 sprite at scale 2 → 24x32, hitbox 24x32
      drawSprite(KOOPA_SPRITE, KOOPA_PALETTE, px, py, 2, e.facing > 0);
    } else {
      // shell or sliding: 12x12 sprite scale 2 → 24x24
      const offY = e.h - 24;
      drawSprite(KOOPA_SHELL_SPRITE, KOOPA_PALETTE, px, py + offY, 2, false);
      // wobble if about to wake
      if (e.state === 'shell' && e.shellTimer < 60 && Math.floor(performance.now() / 80) % 2) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillRect(px, py + offY, 24, 24);
      }
    }
    return;
  }
  // Goomba
  const offsetX = (e.w - 14*2) / 2;
  const offsetY = (e.h - 12*2);
  drawSprite(GOOMBA_SPRITE, GOOMBA_PALETTE, px + offsetX, py + offsetY, 2, e.facing > 0);
}

function drawNpc(n) {
  const t = performance.now() / 400;
  const bob = Math.sin(t + n.bobPhase) * 2;
  const px = Math.round(n.x - camera.x);
  const py = Math.round(n.y + bob);
  // Body: smaller player sprite (scale 1.5, reduce body width)
  // Use 16x24 sprite at scale 1.5 → 24x36 (hitbox is 24x36, perfect fit)
  drawSprite(PLAYER_SPRITE, npcPalette(), px, py, 1.5, false);

  // "!" speech bubble above (only if not yet triggered)
  if (!n.triggered) {
    const bubbleY = py - 26 + Math.sin(t * 1.5) * 2;
    const bubbleX = px + n.w / 2 - 9;
    // Bubble bg
    ctx.fillStyle = '#fff';
    ctx.fillRect(bubbleX, bubbleY, 18, 20);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(bubbleX, bubbleY, 18, 2);
    ctx.fillRect(bubbleX, bubbleY + 18, 18, 2);
    ctx.fillRect(bubbleX, bubbleY, 2, 20);
    ctx.fillRect(bubbleX + 16, bubbleY, 2, 20);
    // ! mark
    ctx.fillStyle = '#d82800';
    ctx.font = 'bold 16px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('!', bubbleX + 9, bubbleY + 16);
    // arrow tail
    ctx.fillStyle = '#fff';
    ctx.fillRect(bubbleX + 6, bubbleY + 20, 6, 3);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(bubbleX + 6, bubbleY + 22, 6, 1);
    ctx.textAlign = 'start';
  }
}

// NPC palette = same as player but jacket darker/different to suggest "another version"
function npcPalette() {
  const c = content.character;
  return {
    H: c.hair,
    S: c.skin,
    G: '#1a1a1a',
    L: '#ffffff',
    R: '#c8302c',
    J: shade(c.jacket, -30),
    W: c.shirt,
    P: c.pants,
    O: c.shoes
  };
}

function drawParticle(p) {
  const alpha = Math.min(1, p.life / 60);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = p.color || '#fff';
  ctx.font = 'bold 16px "VT323", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(p.text, p.x - camera.x, p.y);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'start';
}

// =====================================================
// MAIN LOOP
// =====================================================
function loop(t) {
  const dt = (t - lastFrame) / 16.67;
  lastFrame = t;
  if (scene === 'playing' && !modalOpen) {
    updatePlayer();
    for (const e of enemies) updateEnemy(e);
    updateBullets();
    updateParticles();
    updateCamera();
  }
  render();
  requestAnimationFrame(loop);
}

// =====================================================
// BOOT
// =====================================================
boot();

// Reload on hash change → could be admin save trigger
window.addEventListener('storage', e => {
  if (e.key === LS_KEY) {
    try {
      const v = JSON.parse(e.newValue || '{}');
      if (v.cleared) progress.cleared = v.cleared;
    } catch {}
  }
});
</script>
