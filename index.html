<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>陳則皞の世界 · 把聽眾變玩家</title>
<meta name="description" content="不是一張 EP,是一款遊戲。一起推進這張世界地圖。">
<meta property="og:title" content="陳則皞の世界 · 把聽眾變玩家">
<meta property="og:description" content="不是一張 EP,是一款遊戲。一起推進這張世界地圖。">
<meta property="og:locale" content="zh_TW">
<meta name="theme-color" content="#efe9de">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

<style>
  :root {
    --gb-darkest: #0f380f;
    --gb-dark: #306230;
    --gb-mid: #8bac0f;
    --gb-light: #9bbc0f;
    --gb-lightest: #d0d88c;
    --paper: #efe9de;
    --paper-light: #fdfaf3;
    --paper-edge: #cbc0ae;
    --ink: #2a2624;
    --ink-soft: #7a6d5c;
    --gold: #b39a78;
    --gold-deep: #6a4e32;
    --locked: #8a7d6c;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(139, 172, 15, 0.05) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(179, 154, 120, 0.08) 0%, transparent 40%);
  }

  /* ========== Scene Engine ========== */
  .scene {
    position: fixed;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    transform: translateX(24px);
    -webkit-overflow-scrolling: touch;
  }
  .scene.active {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0);
  }
  .scene.leaving {
    opacity: 0;
    transform: translateX(-24px);
    pointer-events: none;
  }

  .wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 28px 20px 96px;
  }

  /* ========== SCENE 1: Intro ========== */
  .scene-intro {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: var(--paper);
    background-image:
      radial-gradient(rgba(15, 56, 15, 0.06) 1px, transparent 1px);
    background-size: 4px 4px;
  }
  .intro-card {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 20px;
  }
  .intro-speaker-row {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
  }
  .avatar-pixel {
    width: 96px;
    height: 96px;
    border: 3px solid var(--gb-darkest);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    flex-shrink: 0;
    display: block;
    background: var(--paper);
    box-shadow: 3px 3px 0 var(--gb-dark);
  }

  .intro-name {
    font-family: "Press Start 2P", monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--gb-darkest);
  }

  /* Gameboy dialog */
  .gb-dialog {
    position: relative;
    background: var(--gb-lightest);
    border: 3px solid var(--gb-darkest);
    padding: 22px 20px 28px;
    box-shadow:
      4px 4px 0 var(--gb-darkest),
      inset 0 0 0 2px var(--gb-light);
    font-family: "VT323", "Courier New", monospace;
    color: var(--gb-darkest);
    cursor: pointer;
    min-height: 180px;
    display: flex;
    flex-direction: column;
  }
  .gb-dialog .text {
    font-size: 22px;
    line-height: 1.55;
    min-height: 3.4em;
    white-space: pre-wrap;
    flex: 1;
  }
  .gb-dialog .cursor {
    display: inline-block;
    width: 10px;
    height: 16px;
    background: var(--gb-darkest);
    animation: blink 0.8s step-end infinite;
    vertical-align: middle;
    margin-left: 3px;
  }
  .gb-dialog .next-indicator {
    position: absolute;
    right: 14px;
    bottom: 8px;
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 10px solid var(--gb-darkest);
    animation: bob 0.9s ease-in-out infinite;
    opacity: 0;
  }
  .gb-dialog.typed .next-indicator { opacity: 1; }
  .gb-dialog.last .next-indicator { display: none; }

  @keyframes blink { 50% { opacity: 0; } }
  @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(3px); } }

  .intro-progress {
    display: flex;
    gap: 6px;
    justify-content: center;
  }
  .intro-progress .dot {
    width: 8px;
    height: 8px;
    background: var(--paper-edge);
    border: 2px solid var(--gb-darkest);
  }
  .intro-progress .dot.done { background: var(--gb-dark); }

  /* 90s visitor counter */
  .visitor-counter {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--gb-darkest);
    margin-top: 4px;
  }
  .visitor-counter .c-label { opacity: 0.75; }
  .visitor-counter .c-num {
    background: var(--gb-darkest);
    color: var(--gb-light);
    padding: 4px 9px;
    letter-spacing: 4px;
    font-size: 11px;
    border: 2px solid var(--gb-darkest);
    box-shadow: 2px 2px 0 var(--gb-dark);
  }
  .visitor-counter .c-num .you {
    color: var(--gb-lightest);
    font-size: 8px;
    opacity: 0.7;
    letter-spacing: 1px;
    margin-left: 4px;
  }


  .intro-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .intro-actions button {
    font-family: "Press Start 2P", monospace;
    font-size: 10px;
    padding: 12px 18px;
    background: var(--paper-light);
    color: var(--gb-darkest);
    border: 2px solid var(--gb-darkest);
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.15s;
  }
  .intro-actions button:hover {
    background: var(--gb-lightest);
    transform: translate(-1px, -1px);
    box-shadow: 2px 2px 0 var(--gb-darkest);
  }
  .intro-actions .btn-enter {
    background: var(--gb-dark);
    color: var(--paper-light);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .intro-actions .btn-enter.show {
    opacity: 1;
    pointer-events: auto;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-1px, -1px); box-shadow: 2px 2px 0 var(--gb-darkest); }
  }

  /* ========== SCENE 2: Map ========== */
  .scene-map { background: var(--paper); }

  .map-header {
    text-align: center;
    padding: 32px 0 16px;
    border-bottom: 1px dashed var(--paper-edge);
    margin-bottom: 22px;
  }
  .map-header .pixel-title {
    font-family: "Press Start 2P", monospace;
    font-size: 14px;
    color: var(--gb-darkest);
    letter-spacing: 2px;
    margin: 0 0 10px;
    line-height: 1.6;
  }
  .map-header .sub {
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 3px;
    margin: 0;
  }
  .map-header .status {
    margin-top: 14px;
    font-family: "VT323", monospace;
    font-size: 16px;
    color: var(--gb-dark);
  }
  .map-header .class-tag {
    display: inline-block;
    padding: 3px 9px;
    background: var(--gb-light);
    border: 2px solid var(--gb-darkest);
    color: var(--gb-darkest);
    font-size: 12px;
    letter-spacing: 1px;
    margin-left: 6px;
  }

  .map-section-title {
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    color: var(--gb-darkest);
    letter-spacing: 2px;
    margin: 0 0 6px;
  }
  .map-section-note {
    font-size: 12px;
    color: var(--ink-soft);
    margin: 0 0 18px;
    letter-spacing: 1px;
  }

  .world-map {
    position: relative;
    padding: 16px 12px;
    background: var(--paper-light);
    border: 2px solid var(--gold);
    box-shadow: 3px 3px 0 var(--paper-edge);
    margin-bottom: 36px;
  }

  .node {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 12px;
    margin-bottom: 10px;
    background: var(--paper);
    border: 2px solid var(--paper-edge);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    -webkit-tap-highlight-color: rgba(139, 172, 15, 0.3);
  }
  .node:active:not(.locked) {
    transform: scale(0.98);
  }
  .node:hover:not(.locked) {
    border-color: var(--gb-dark);
    background: var(--gb-lightest);
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--gb-darkest);
  }
  .node.locked { cursor: not-allowed; opacity: 0.55; }
  .node.cleared { border-color: var(--gb-dark); background: var(--gb-lightest); }

  .node-icon {
    width: 44px; height: 44px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Press Start 2P", monospace;
    font-size: 12px;
    background: var(--gb-light);
    border: 2px solid var(--gb-darkest);
    color: var(--gb-darkest);
    image-rendering: pixelated;
  }
  .node.locked .node-icon {
    background: var(--paper-edge);
    border-color: var(--locked);
    color: var(--paper-light);
  }
  .node.cleared .node-icon { background: var(--gb-mid); }
  .node.cleared .node-icon::after { content: "✓"; font-size: 18px; color: var(--gb-darkest); }
  .node-body { flex: 1; min-width: 0; }
  .node-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    margin: 0 0 4px;
    letter-spacing: 1px;
  }
  .node-title .num {
    font-family: "VT323", monospace;
    color: var(--gold);
    margin-right: 8px;
    font-size: 16px;
  }
  .node-desc {
    font-size: 12px;
    color: var(--ink-soft);
    margin: 0;
  }
  .node-badge {
    font-family: "Press Start 2P", monospace;
    font-size: 8px;
    padding: 3px 6px;
    border: 1px solid var(--ink-soft);
    color: var(--ink-soft);
    letter-spacing: 1px;
  }
  .node-badge.main { background: var(--gold); color: var(--paper-light); border-color: var(--gold-deep); }
  .node-badge.side { background: var(--gb-lightest); color: var(--gb-darkest); border-color: var(--gb-dark); }
  .node-badge.hidden { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .progress-wrap {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--paper-edge);
  }
  .progress-label {
    font-family: "VT323", monospace;
    font-size: 15px;
    color: var(--gb-dark);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .progress-bar {
    height: 14px;
    background: var(--paper);
    border: 2px solid var(--gb-darkest);
    padding: 2px;
  }
  .progress-fill {
    height: 100%;
    background-image: linear-gradient(90deg, var(--gb-dark) 50%, var(--gb-mid) 50%);
    background-size: 8px 100%;
    transition: width 0.6s ease;
  }

  /* Gate (Email) */
  .gate {
    margin-top: 32px;
    padding: 26px 20px;
    background: var(--paper-light);
    border: 3px solid var(--gb-darkest);
    box-shadow: 5px 5px 0 var(--paper-edge);
    text-align: center;
    position: relative;
  }
  .gate::before {
    content: "";
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 28px;
    background: var(--gb-light);
    border: 3px solid var(--gb-darkest);
  }
  .gate .gate-title {
    font-family: "Press Start 2P", monospace;
    font-size: 12px;
    color: var(--gb-darkest);
    letter-spacing: 2px;
    margin: 4px 0 12px;
  }
  .gate .gate-sub {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 6px;
    letter-spacing: 1px;
  }
  .gate .gate-note {
    font-size: 11px;
    color: var(--ink-soft);
    margin: 0 0 16px;
    font-style: italic;
  }
  .gate .gate-form {
    display: flex;
    gap: 8px;
    max-width: 440px;
    margin: 0 auto;
  }
  .gate input[type="email"] {
    flex: 1;
    padding: 10px 12px;
    font-family: "VT323", monospace;
    font-size: 18px;
    background: var(--paper);
    border: 2px solid var(--gb-darkest);
    color: var(--ink);
    min-width: 0;
  }
  .gate input[type="email"]:focus { outline: none; background: var(--gb-lightest); }
  .gate button.gate-submit {
    padding: 10px 18px;
    font-family: "Press Start 2P", monospace;
    font-size: 10px;
    background: var(--gb-darkest);
    color: var(--gb-lightest);
    border: 2px solid var(--gb-darkest);
    cursor: pointer;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .gate .success {
    display: none;
    padding: 12px;
    background: var(--gb-lightest);
    border: 2px solid var(--gb-dark);
    color: var(--gb-darkest);
    font-family: "VT323", monospace;
    font-size: 18px;
    margin-top: 12px;
  }
  .gate .success.show { display: block; }

  footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px dashed var(--paper-edge);
    text-align: center;
    color: var(--ink-soft);
    font-size: 11px;
    letter-spacing: 2px;
  }
  footer a { color: var(--gold-deep); text-decoration: none; border-bottom: 1px solid var(--gold); }
  footer .credits {
    font-family: "Press Start 2P", monospace;
    font-size: 8px;
    margin-top: 12px;
    letter-spacing: 2px;
    color: var(--paper-edge);
  }

  /* ========== SCENE 3: Level ========== */
  .scene-level {
    background: var(--paper);
  }
  .level-topbar {
    position: sticky;
    top: 0;
    background: var(--paper);
    border-bottom: 2px solid var(--gb-darkest);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10;
  }
  .level-topbar .back-btn {
    font-family: "Press Start 2P", monospace;
    font-size: 10px;
    background: var(--gb-darkest);
    color: var(--gb-lightest);
    border: 2px solid var(--gb-darkest);
    padding: 8px 12px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .level-topbar .back-btn:hover { background: var(--gb-dark); }
  .level-topbar .topbar-title {
    font-family: "VT323", monospace;
    font-size: 18px;
    color: var(--gb-darkest);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .level-body {
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 20px 80px;
  }
  .level-body .level-tag {
    font-family: "Press Start 2P", monospace;
    font-size: 10px;
    color: var(--gold-deep);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .level-body h2 {
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 6px;
    color: var(--ink);
    letter-spacing: 2px;
  }
  .level-body .level-sub {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 22px;
  }
  .level-body .story {
    background: var(--paper-light);
    border-left: 4px solid var(--gold);
    padding: 16px 18px;
    margin-bottom: 22px;
    font-family: "VT323", monospace;
    font-size: 19px;
    line-height: 1.7;
    color: var(--ink);
  }

  .audio-block {
    margin-bottom: 20px;
    padding: 14px;
    background: var(--gb-lightest);
    border: 2px solid var(--gb-darkest);
  }
  .audio-block .audio-title {
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    color: var(--gb-darkest);
    margin-bottom: 10px;
    letter-spacing: 1.5px;
  }
  .audio-block .tone-controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .audio-block button.tone-btn {
    font-family: "VT323", monospace;
    font-size: 17px;
    background: var(--gb-darkest);
    color: var(--gb-lightest);
    border: 2px solid var(--gb-darkest);
    padding: 6px 16px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .audio-block .tone-meta {
    font-family: "VT323", monospace;
    font-size: 15px;
    color: var(--gb-darkest);
    flex: 1;
  }

  .missing-piece {
    position: relative;
    padding: 24px 18px;
    margin-bottom: 22px;
    background: var(--paper-light);
    border: 2px dashed var(--gold-deep);
    text-align: center;
    min-height: 120px;
  }
  .missing-piece::before {
    content: "???";
    font-family: "Press Start 2P", monospace;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 6px;
    display: block;
    margin-bottom: 10px;
    animation: glitch 3s infinite;
  }
  @keyframes glitch {
    0%, 90%, 100% { transform: translate(0, 0); opacity: 1; }
    93% { transform: translate(-2px, 1px); opacity: 0.8; }
    96% { transform: translate(2px, -1px); opacity: 0.9; }
  }
  .missing-piece .mp-caption {
    font-size: 13px;
    color: var(--ink-soft);
    font-style: italic;
    line-height: 1.7;
  }
  .missing-piece.filled::before {
    content: "✓ FILLED";
    font-size: 14px;
    color: var(--gb-dark);
    animation: none;
  }
  .missing-piece.filled {
    border-style: solid;
    border-color: var(--gb-dark);
    background: var(--gb-lightest);
  }

  .branch-block {
    padding: 16px;
    margin-bottom: 22px;
    background: var(--paper-light);
    border: 2px solid var(--paper-edge);
  }
  .branch-block .branch-title {
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    color: var(--gold-deep);
    margin-bottom: 10px;
    letter-spacing: 1.5px;
  }
  .branch-block .branch-locked {
    font-family: "VT323", monospace;
    font-size: 17px;
    color: var(--ink-soft);
    text-align: center;
    padding: 18px 0;
    letter-spacing: 1px;
  }
  .branch-block .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .branch-block .choice {
    padding: 14px;
    border: 2px solid var(--paper-edge);
    background: var(--paper);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
  }
  .branch-block .choice:hover {
    border-color: var(--gb-dark);
    background: var(--gb-lightest);
  }
  .branch-block .choice.picked {
    border-color: var(--gb-dark);
    background: var(--gb-light);
    color: var(--gb-darkest);
  }

  .level-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .level-actions button {
    flex: 1;
    min-width: 140px;
    padding: 14px;
    font-family: "PingFang TC", sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    border: 2px solid var(--gb-darkest);
  }
  .btn-primary { background: var(--gb-dark); color: var(--paper-light); }
  .btn-primary:hover { background: var(--gb-darkest); }
  .btn-secondary { background: var(--paper); color: var(--ink); }
  .btn-secondary:hover { background: var(--gb-lightest); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(40px);
    background: var(--gb-darkest);
    color: var(--gb-lightest);
    padding: 12px 20px;
    font-family: "VT323", monospace;
    font-size: 18px;
    border: 2px solid var(--gb-light);
    box-shadow: 3px 3px 0 var(--gb-dark);
    z-index: 200;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    max-width: 90%;
    text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Admin link in footer */
  .admin-link-footer {
    font-family: "Press Start 2P", monospace;
    font-size: 8px;
    color: var(--ink-soft);
    text-decoration: none;
    letter-spacing: 2px;
    display: inline-block;
    margin-top: 8px;
    padding: 5px 10px;
    border: 1px dashed var(--paper-edge);
    opacity: 0.7;
  }
  .admin-link-footer:hover {
    opacity: 1;
    color: var(--gold-deep);
    border-color: var(--gold);
  }

  @media (max-width: 600px) {
    .wrap { padding: 22px 14px 80px; }
    .map-header .pixel-title { font-size: 12px; }
    .gb-dialog .text { font-size: 20px; }
    .node-title { font-size: 14px; }
    .node-icon { width: 38px; height: 38px; font-size: 10px; }

<script>
// ============================================================
// FALLBACK CONTENT (used if fetch fails)
// ============================================================
const DEFAULT_CONTENT = {
  meta: { pixelTitle: "CHEN TSE-HAO", subtitle: "H A O · の 世 界" },
  speaker: "HAO · 陳則皞",
  intro: [
    "嘿,好久沒聯絡。",
    "這不是一張 EP,是一款遊戲。",
    "五個關卡、一張世界地圖 — 陪我把歌搬出來。",
    "不用付費,也能看;想決定走向,就拿鑰匙。",
    "點「進入世界」往下走。"
  ],
  mapTitle: "▸ 世界地圖",
  mapNote: "每個節點是一首歌、一個章節、或一個企劃。點進去看關卡細節。",
  gate: {
    title: "加入村民",
    sub: "免費。我會不定期寄一些手寫信、碎念、或發行前的 Demo。",
    note: "你也可以把生活垃圾丟回來。我不一定會回,但我在。",
    successText: "✓ 你已進入村莊。身份升級為「村民」。"
  },
  classes: { guest: "訪客", villager: "村民" },
  levels: []
};

// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'hao-rpg-v2';
const defaultState = {
  cleared: [], filled: [], hasKey: false, picks: {},
  email: null, class: 'guest', introSeen: false,
};
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { ...defaultState };
    return { ...defaultState, ...JSON.parse(raw) };
  } catch { return { ...defaultState }; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
let state = loadState();
let CONTENT = DEFAULT_CONTENT;

// ============================================================
// CONTENT LOADER
// ============================================================
async function loadContent() {
  try {
    const res = await fetch('content.json?' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    CONTENT = await res.json();
  } catch (e) {
    console.warn('Using default content:', e);
    CONTENT = DEFAULT_CONTENT;
  }
  applyContent();
}

function applyContent() {
  document.getElementById('pixelTitle').textContent = CONTENT.meta?.pixelTitle || 'CHEN TSE-HAO';
  document.getElementById('subtitle').textContent = CONTENT.meta?.subtitle || '';
  document.getElementById('introSpeaker').textContent = (CONTENT.speaker || 'HAO').split(' ')[0];
  document.getElementById('mapTitleEl').textContent = CONTENT.mapTitle || '▸ 世界地圖';
  document.getElementById('mapNoteEl').textContent = CONTENT.mapNote || '';
  document.getElementById('gateTitle').textContent = CONTENT.gate?.title || '加入村民';
  document.getElementById('gateSub').textContent = CONTENT.gate?.sub || '';
  document.getElementById('gateNote').textContent = CONTENT.gate?.note || '';
  document.getElementById('gateSuccess').textContent = CONTENT.gate?.successText || '✓';
  renderIntroProgress();
  renderNodes();
  updateClass();
}

// ============================================================
// SCENE ROUTER (hash-based)
// ============================================================
function parseHash() {
  const h = (location.hash || '').replace(/^#/, '');
  if (!h) return { scene: 'intro' };
  if (h === 'map') return { scene: 'map' };
  if (h.startsWith('level/')) return { scene: 'level', levelId: h.split('/')[1] };
  // Short form: #L1
  if (/^L\d+$/i.test(h)) return { scene: 'level', levelId: h };
  return { scene: 'intro' };
}

function switchScene(to, params = {}) {
  const current = document.querySelector('.scene.active');
  const next = document.querySelector(`.scene[data-scene="${to}"]`);
  if (!next) return;
  if (current === next) {
    if (to === 'level') renderLevel(params.levelId);
    return;
  }
  if (to === 'level') renderLevel(params.levelId);
  if (to === 'map') renderNodes();

  if (current) {
    current.classList.add('leaving');
    current.classList.remove('active');
    setTimeout(() => current.classList.remove('leaving'), 350);
  }
  next.classList.add('active');
  next.scrollTop = 0;
  // BGM: intro and map each have their own track; level stops music
  switchBgm(to === 'level' ? null : to);
}

function navigate(hash) {
  if (location.hash === hash) {
    handleHashChange();
  } else {
    location.hash = hash;
  }
}

function handleHashChange() {
  const raw = location.hash.replace(/^#/, '');
  if (!raw) {
    // Empty hash: first visit -> intro, returning -> map
    location.hash = state.introSeen ? 'map' : 'intro';
    return;
  }
  const { scene, levelId } = parseHash();
  // If navigating back to intro, restart it so they can re-read
  if (scene === 'intro') restartIntro();
  switchScene(scene, { levelId });
}

window.addEventListener('hashchange', handleHashChange);

// ============================================================
// INTRO (typewriter)
// ============================================================
let introIndex = 0;
let introTyping = false;
let currentTypeIv = null;

function renderIntroProgress() {
  const box = document.getElementById('introProgress');
  box.innerHTML = '';
  const total = (CONTENT.intro || []).length;
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('span');
    dot.className = 'dot' + (i <= introIndex ? ' done' : '');
    box.appendChild(dot);
  }
}

function typeLine(line, cb) {
  const typedEl = document.getElementById('typedText');
  const dialog = document.getElementById('introDialog');
  introTyping = true;
  dialog.classList.remove('typed');
  typedEl.textContent = '';
  let i = 0;
  currentTypeIv = setInterval(() => {
    typedEl.textContent += line[i];
    i++;
    if (i >= line.length) {
      clearInterval(currentTypeIv);
      currentTypeIv = null;
      introTyping = false;
      dialog.classList.add('typed');
      cb && cb();
    }
  }, 45);
}

function advanceIntro() {
  const lines = CONTENT.intro || [];
  const dialog = document.getElementById('introDialog');
  const typedEl = document.getElementById('typedText');

  if (introTyping && currentTypeIv) {
    clearInterval(currentTypeIv);
    typedEl.textContent = lines[introIndex];
    dialog.classList.add('typed');
    introTyping = false;
    return;
  }
  introIndex++;
  if (introIndex >= lines.length) {
    introIndex = lines.length - 1;
    dialog.classList.add('last');
    document.getElementById('btnEnter').classList.add('show');
    renderIntroProgress();
    return;
  }
  renderIntroProgress();
  typeLine(lines[introIndex]);
}

function restartIntro() {
  introIndex = 0;
  document.getElementById('introDialog').classList.remove('last');
  document.getElementById('btnEnter').classList.remove('show');
  renderIntroProgress();
  if (currentTypeIv) clearInterval(currentTypeIv);
  const lines = CONTENT.intro || [];
  if (lines.length) typeLine(lines[0]);
}

document.getElementById('introDialog').addEventListener('click', () => {
  // Retry BGM on user gesture (first page-load autoplay is blocked)
  if (activeBgmScene && bgmEls[activeBgmScene] && bgmEls[activeBgmScene].paused) {
    switchBgm(activeBgmScene);
  } else if (!activeBgmScene) {
    bgmOnFirstGesture();
  }
  advanceIntro();
});
document.getElementById('btnSkip').addEventListener('click', () => {
  state.introSeen = true; saveState();
  navigate('#map');
});
document.getElementById('btnEnter').addEventListener('click', () => {
  state.introSeen = true; saveState();
  navigate('#map');
});

// ============================================================
// MAP / NODES
// ============================================================
function isUnlocked(level) {
  if (level.defaultUnlocked) return true;
  if (!level.unlockedBy) return false;
  if (level.unlockedBy === '__village__') return !!state.email;
  return state.cleared.includes(level.unlockedBy);
}

function renderNodes() {
  const el = document.getElementById('nodes');
  if (!el) return;
  el.innerHTML = '';
  const levels = CONTENT.levels || [];
  levels.forEach((lv) => {
    const unlocked = isUnlocked(lv);
    const cleared = state.cleared.includes(lv.id);
    const n = document.createElement('div');
    n.className = 'node' + (unlocked ? '' : ' locked') + (cleared ? ' cleared' : '');
    n.dataset.id = lv.id;
    n.innerHTML = `
      <div class="node-icon">${unlocked ? escapeHtml(lv.num) : '?'}</div>
      <div class="node-body">
        <p class="node-title"><span class="num">${escapeHtml(lv.num)}</span>${unlocked ? escapeHtml(lv.title) : '???'}</p>
        <p class="node-desc">${unlocked ? escapeHtml(lv.desc) : '尚未解鎖。完成前一關才看得到這裡。'}</p>
      </div>
      <span class="node-badge ${lv.tag || 'main'}">${(lv.tag || 'main').toUpperCase()}</span>
    `;
    if (unlocked) {
      n.addEventListener('click', () => navigate('#' + lv.id));
    } else {
      n.addEventListener('click', () => toast('這裡還沒開 — 先往前推進。'));
    }
    el.appendChild(n);
  });
  const cleared = state.cleared.length;
  const total = levels.length;
  const pt = document.getElementById('progressText');
  const pf = document.getElementById('progressFill');
  if (pt) pt.textContent = `${cleared} / ${total}`;
  if (pf) pf.style.width = total ? `${(cleared / total) * 100}%` : '0%';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============================================================
// LEVEL SCENE
// ============================================================
let activeLevel = null;

function renderLevel(levelId) {
  const lv = (CONTENT.levels || []).find(l => l.id === levelId);
  if (!lv) {
    navigate('#map');
    return;
  }
  if (!isUnlocked(lv)) {
    toast('這關還沒解鎖。');
    navigate('#map');
    return;
  }
  activeLevel = lv;
  // Auto-mark as cleared on entering (natural progression, no "mark as done" button)
  if (!state.cleared.includes(lv.id)) {
    state.cleared.push(lv.id);
    if (lv.hasMissingPiece && !state.filled.includes(lv.id)) {
      state.filled.push(lv.id);
    }
    saveState();
  }
  document.getElementById('topbarTitle').textContent = lv.title;
  document.getElementById('levelTag').textContent = `LEVEL ${lv.num}`;
  document.getElementById('levelTitle').textContent = lv.title;
  document.getElementById('levelSub').textContent = lv.desc;
  document.getElementById('levelStory').textContent = lv.story;
  document.getElementById('toneMeta').textContent = `${lv.toneNote} · ${lv.toneBpm} BPM · ${lv.toneMood}`;

  const mpEl = document.getElementById('missingPiece');
  const mpCap = document.getElementById('mpCaption');
  if (lv.hasMissingPiece && lv.mpCaption) {
    mpEl.style.display = 'block';
    mpCap.textContent = lv.mpCaption;
    mpEl.classList.toggle('filled', state.filled.includes(lv.id));
  } else {
    mpEl.style.display = 'none';
  }

  const branchBlock = document.getElementById('branchBlock');
  const branchLocked = document.getElementById('branchLocked');
  const branchChoices = document.getElementById('branchChoices');
  if (lv.branches && lv.branches.length) {
    branchBlock.style.display = 'block';
    if (state.email) {
      branchLocked.style.display = 'none';
      branchChoices.style.display = 'grid';
      branchChoices.innerHTML = '';
      lv.branches.forEach(ch => {
        const c = document.createElement('div');
        c.className = 'choice' + (state.picks[lv.id] === ch.id ? ' picked' : '');
        c.textContent = ch.label;
        c.addEventListener('click', () => {
          state.picks[lv.id] = ch.id;
          saveState();
          branchChoices.querySelectorAll('.choice').forEach(x => x.classList.remove('picked'));
          c.classList.add('picked');
          toast(`已投票:${ch.label}`);
        });
        branchChoices.appendChild(c);
      });
    } else {
      branchLocked.style.display = 'block';
      branchChoices.style.display = 'none';
    }
  } else {
    branchBlock.style.display = 'none';
  }
  stopTone();
}

document.getElementById('btnBack').addEventListener('click', () => {
  stopTone();
  navigate('#map');
});

// ============================================================
// TONE GENERATOR — renders to WAV + plays via <audio> so iOS
// silent switch does NOT mute it (Web Audio API is muted by
// silent switch, but <audio> media is not).
// ============================================================
const NOTE_FREQ = {
  'C3':130.81,'D3':146.83,'E3':164.81,'F3':174.61,'G3':196.00,'A3':220.00,'B3':246.94,
  'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,'A4':440.00,
};
let audioEl = null;
let currentBlobUrl = null;
let toneCache = {};

function audioBufferToWavBlob(buffer) {
  const sampleRate = buffer.sampleRate;
  const samples = buffer.getChannelData(0);
  const len = samples.length;
  const bufferSize = 44 + len * 2;
  const arr = new ArrayBuffer(bufferSize);
  const view = new DataView(arr);
  const writeStr = (o, s) => { for (let i=0;i<s.length;i++) view.setUint8(o+i, s.charCodeAt(i)); };
  writeStr(0, 'RIFF');
  view.setUint32(4, bufferSize - 8, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeStr(36, 'data');
  view.setUint32(40, len * 2, true);
  let o = 44;
  for (let i = 0; i < len; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(o, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    o += 2;
  }
  return new Blob([arr], { type: 'audio/wav' });
}

async function renderToneBlob(level, durationSec) {
  const cacheKey = `${level.id}-${durationSec}`;
  if (toneCache[cacheKey]) return toneCache[cacheKey];
  const sampleRate = 22050;
  const totalSamples = Math.floor(sampleRate * durationSec);
  const OfflineCtx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
  const ctx = new OfflineCtx(1, totalSamples, sampleRate);
  const baseFreq = NOTE_FREQ[level.toneNote] || 220;
  const stepSec = (60 / level.toneBpm) / 2;
  const melody = [0, 4, 7, 4, 0, 7, 4, 0];
  let t = 0, step = 0;
  while (t < durationSec - stepSec) {
    const osc = ctx.createOscillator();
    osc.type = 'square';
    const offset = melody[step % melody.length];
    osc.frequency.value = baseFreq * Math.pow(2, offset / 12);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + stepSec * 0.9);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(t);
    osc.stop(t + stepSec);
    t += stepSec;
    step++;
  }
  const buffer = await ctx.startRendering();
  const blob = audioBufferToWavBlob(buffer);
  const url = URL.createObjectURL(blob);
  toneCache[cacheKey] = url;
  return url;
}

function ensureAudioEl() {
  if (audioEl) return audioEl;
  audioEl = document.createElement('audio');
  audioEl.setAttribute('playsinline', '');
  audioEl.setAttribute('webkit-playsinline', '');
  audioEl.preload = 'auto';
  audioEl.addEventListener('ended', stopTone);
  document.body.appendChild(audioEl);
  return audioEl;
}

async function playTone() {
  if (!activeLevel) return;
  stopTone();
  const btn = document.getElementById('playTone');
  btn.textContent = '⏳ …';
  try {
    const url = await renderToneBlob(activeLevel, 30);
    const el = ensureAudioEl();
    el.src = url;
    el.currentTime = 0;
    await el.play();
    btn.textContent = '■ STOP';
  } catch (e) {
    console.error(e);
    btn.textContent = '▶ PLAY';
    toast('播放失敗,再試一次');
  }
}

function stopTone() {
  if (audioEl) {
    audioEl.pause();
    try { audioEl.currentTime = 0; } catch {}
  }
  const btn = document.getElementById('playTone');
  if (btn) btn.textContent = '▶ PLAY';
}

document.getElementById('playTone').addEventListener('click', () => {
  if (audioEl && !audioEl.paused) stopTone();
  else playTone();
});

// ============================================================
// BGM — Two 8-bit tracks (intro + map) that crossfade between
// scenes. First user tap starts audio (browser autoplay rule).
// Level scene stops BGM (level has its own tone preview).
// ============================================================
function fadeVolume(el, from, to, ms, cb) {
  const start = Date.now();
  el.volume = from;
  (function tick() {
    if (!el) return;
    const p = Math.min(1, (Date.now() - start) / ms);
    el.volume = from + (to - from) * p;
    if (p < 1) requestAnimationFrame(tick);
    else cb && cb();
  })();
}

async function renderBgm({ baseFreq, bpm, melody, bass, durationSec = 8 }) {
  const sampleRate = 16000;
  const totalSamples = sampleRate * durationSec;
  const OfflineCtx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
  const ctx = new OfflineCtx(1, totalSamples, sampleRate);
  const stepSec = (60 / bpm) / 2;
  let t = 0, step = 0;
  while (t < durationSec - stepSec * 0.5) {
    const mOff = melody[step % melody.length];
    const bOff = bass[step % bass.length];
    const o1 = ctx.createOscillator();
    o1.type = 'square';
    o1.frequency.value = baseFreq * Math.pow(2, mOff / 12);
    const g1 = ctx.createGain();
    g1.gain.setValueAtTime(0.09, t);
    g1.gain.exponentialRampToValueAtTime(0.001, t + stepSec * 0.92);
    o1.connect(g1); g1.connect(ctx.destination);
    o1.start(t); o1.stop(t + stepSec);
    const o2 = ctx.createOscillator();
    o2.type = 'triangle';
    o2.frequency.value = baseFreq * Math.pow(2, bOff / 12);
    const g2 = ctx.createGain();
    g2.gain.setValueAtTime(0.13, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + stepSec * 0.85);
    o2.connect(g2); g2.connect(ctx.destination);
    o2.start(t); o2.stop(t + stepSec);
    t += stepSec;
    step++;
  }
  const buffer = await ctx.startRendering();
  return audioBufferToWavBlob(buffer);
}

const BGM_PATTERNS = {
  intro: {
    baseFreq: 261.63, bpm: 72,
    melody: [ 0, 4, 7, 4,  5, 9, 12, 9,  7, 11, 14, 11,  12, 7, 4, 0 ],
    bass:   [-12,-12,-12,-12, -7,-7,-7,-7, -5,-5,-5,-5, -12,-12,-12,-12],
  },
  map: {
    baseFreq: 220.00, bpm: 88,
    melody: [ 0, 3, 7, 3,  5, 8, 12, 8,  7, 10, 14, 10,  12, 7, 3, 0 ],
    bass:   [-12,-12,-12,-12, -7,-7,-7,-7, -5,-5,-5,-5, -12,-12,-12,-12],
  },
};

const bgmEls = {}; // scene -> audio element
const bgmUrls = {};
let activeBgmScene = null;

async function getBgmUrl(scene) {
  if (bgmUrls[scene]) return bgmUrls[scene];
  const blob = await renderBgm(BGM_PATTERNS[scene]);
  const url = URL.createObjectURL(blob);
  bgmUrls[scene] = url;
  return url;
}

async function switchBgm(toScene) {
  // Fade out the currently playing track
  if (activeBgmScene && activeBgmScene !== toScene && bgmEls[activeBgmScene]) {
    const old = bgmEls[activeBgmScene];
    fadeVolume(old, old.volume, 0, 500, () => {
      try { old.pause(); } catch {}
    });
  }
  activeBgmScene = toScene;
  if (!toScene) return;
  let el = bgmEls[toScene];
  if (!el) {
    try {
      const url = await getBgmUrl(toScene);
      el = document.createElement('audio');
      el.setAttribute('playsinline', '');
      el.setAttribute('webkit-playsinline', '');
      el.loop = true;
      el.src = url;
      el.volume = 0;
      document.body.appendChild(el);
      bgmEls[toScene] = el;
    } catch (e) {
      console.warn('BGM render failed', e);
      return;
    }
  }
  try {
    await el.play();
    fadeVolume(el, el.volume, 0.32, 800);
  } catch {
    // autoplay denied — will retry on next user gesture
  }
}

function bgmOnFirstGesture() {
  // Called from first user tap on intro dialog
  if (!activeBgmScene) switchBgm('intro');
}

// ============================================================
// GATE (Email)
// ============================================================
document.getElementById('gateForm').addEventListener('submit', (e) => {
  const email = document.getElementById('gateEmail').value.trim();
  if (!email || !email.includes('@')) {
    e.preventDefault();
    toast('email 格式怪怪的,再檢查一下');
    return;
  }
  // Let the form POST to Kit via hidden iframe (CORS-free pattern).
  // We optimistically update UI/state; Kit handles dedupe on its side.
  state.email = email;
  if (state.class === 'guest') state.class = 'villager';
  saveState();
  document.getElementById('gateSuccess').classList.add('show');
  updateClass();
  renderNodes();
  toast('✓ 歡迎來到村莊,' + email.split('@')[0]);
  // Clear input after the native form submit has fired
  setTimeout(() => {
    const inp = document.getElementById('gateEmail');
    if (inp) inp.value = '';
  }, 200);
});

function updateClass() {
  const tag = document.getElementById('classTag');
  const labels = (CONTENT.classes) || defaultState;
  tag.textContent = (labels[state.class]) || '遊客';
  if (state.email) document.getElementById('gateSuccess').classList.add('show');
}

// ============================================================
// TOAST
// ============================================================
const toastEl = document.getElementById('toast');
let toastTimer = null;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2400);
}

// ============================================================
// VISITOR COUNTER (90s style · 4 digits · wraps at 10000)
// Uses abacus.jasoncameron.dev — free, no API key needed.
// ============================================================
async function fetchVisitorCount() {
  const numEl = document.getElementById('visitorCount');
  const youEl = document.getElementById('visitorYou');
  const formatNum = n => (n % 10000).toString().padStart(4, '0');
  try {
    // Only increment once per browser (persistent via localStorage)
    const haveCountedKey = 'hao-rpg-counted';
    const myNumberKey = 'hao-rpg-my-number';
    let myNumber = localStorage.getItem(myNumberKey);
    let endpoint;
    if (localStorage.getItem(haveCountedKey) && myNumber) {
      // Already counted; just fetch current total
      endpoint = 'https://abacus.jasoncameron.dev/get/hao-artist-rpg-mvp/visits';
    } else {
      // First visit: increment
      endpoint = 'https://abacus.jasoncameron.dev/hit/hao-artist-rpg-mvp/visits';
    }
    const res = await fetch(endpoint);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const total = data.value;
    if (!localStorage.getItem(haveCountedKey)) {
      localStorage.setItem(haveCountedKey, '1');
      localStorage.setItem(myNumberKey, String(total));
      myNumber = total;
    }
    // Render with a tiny typewriter-roll effect
    rollNumber(numEl, total, formatNum);
    if (myNumber) youEl.textContent = ` · YOU=${formatNum(Number(myNumber))}`;
  } catch (e) {
    numEl.textContent = '????';
    youEl.textContent = '';
  }
}

function rollNumber(el, finalNum, formatter) {
  const finalStr = formatter(finalNum);
  const duration = 900;
  const start = Date.now();
  function tick() {
    const t = Math.min(1, (Date.now() - start) / duration);
    const n = Math.floor(finalNum * (0.4 + 0.6 * t));
    el.childNodes[0] && (el.childNodes[0].nodeValue = formatter(n));
    if (t < 1) requestAnimationFrame(tick);
    else el.childNodes[0] && (el.childNodes[0].nodeValue = finalStr);
  }
  tick();
}

(async () => {
  await loadContent();
  // Start intro typing
  const lines = CONTENT.intro || [];
  if (lines.length) typeLine(lines[0]);
  // Route to initial scene
  handleHashChange();
  // Fetch visitor count (async, not blocking)
  fetchVisitorCount();
})();
