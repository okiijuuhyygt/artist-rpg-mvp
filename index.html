<style>
  :root {
    --gb-darkest: #0f380f;
    --gb-dark: #306230;
    --gb-mid: #8bac0f;
    --gb-light: #9bbc0f;
    --gb-lightest: #d0d88c;
    --paper: #efe9de;
    --paper-light: #fdfaf3;
    --paper-edge: #cbc0ae;
    --ink: #2a2624;
    --ink-soft: #7a6d5c;
    --gold: #b39a78;
    --gold-deep: #6a4e32;
    --locked: #8a7d6c;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(139, 172, 15, 0.05) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(179, 154, 120, 0.08) 0%, transparent 40%);
  }

  /* ========== Scene Engine ========== */
  .scene {
    position: fixed;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    transform: translateX(24px);
    -webkit-overflow-scrolling: touch;
  }
  .scene.active {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0);
  }
  .scene.leaving {
    opacity: 0;
    transform: translateX(-24px);
    pointer-events: none;
  }

  .wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 28px 20px 96px;
  }

  /* ========== SCENE 1: Intro ========== */
  .scene-intro {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: var(--paper);
    background-image:
      radial-gradient(rgba(15, 56, 15, 0.06) 1px, transparent 1px);
    background-size: 4px 4px;
  }
  .intro-card {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 20px;
  }
  .intro-speaker-row {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
  }
  .avatar-pixel {
    width: 96px;
    height: 96px;
    border: 3px solid var(--gb-darkest);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    flex-shrink: 0;
    display: block;
    background: var(--paper);
    box-shadow: 3px 3px 0 var(--gb-dark);
  }

  .intro-name {
    font-family: "Press Start 2P", monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--gb-darkest);
  }

  /* Gameboy dialog */
  .gb-dialog {
    position: relative;
    background: var(--gb-lightest);
    border: 3px solid var(--gb-darkest);
    padding: 22px 20px 28px;
    box-shadow:
      4px 4px 0 var(--gb-darkest),
      inset 0 0 0 2px var(--gb-light);
    font-family: "VT323", "Courier New", monospace;
    color: var(--gb-darkest);
    cursor: pointer;
    min-height: 180px;
    display: flex;
    flex-direction: column;
  }
  .gb-dialog .text {
    font-size: 22px;
    line-height: 1.55;
    min-height: 3.4em;
    white-space: pre-wrap;
    flex: 1;
  }
  .gb-dialog .cursor {
    display: inline-block;
    width: 10px;
    height: 16px;
    background: var(--gb-darkest);
    animation: blink 0.8s step-end infinite;
    vertical-align: middle;
    margin-left: 3px;
  }
  .gb-dialog .next-indicator {
    position: absolute;
    right: 14px;
    bottom: 8px;
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 10px solid var(--gb-darkest);
    animation: bob 0.9s ease-in-out infinite;
    opacity: 0;
  }
  .gb-dialog.typed .next-indicator { opacity: 1; }
  .gb-dialog.last .next-indicator { display: none; }

  @keyframes blink { 50% { opacity: 0; } }
  @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(3px); } }

  .intro-progress {
    display: flex;
    gap: 6px;
    justify-content: center;
  }
  .intro-progress .dot {
    width: 8px;
    height: 8px;
    background: var(--paper-edge);
    border: 2px solid var(--gb-darkest);
  }
  .intro-progress .dot.done { background: var(--gb-dark); }

  /* 90s visitor counter */
  .visitor-counter {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--gb-darkest);
    margin-top: 4px;
  }
  .visitor-counter .c-label { opacity: 0.75; }
  .visitor-counter .c-num {
    background: var(--gb-darkest);
    color: var(--gb-light);
    padding: 4px 9px;
    letter-spacing: 4px;
    font-size: 11px;
    border: 2px solid var(--gb-darkest);
    box-shadow: 2px 2px 0 var(--gb-dark);
  }
  .visitor-counter .c-num .you {
    color: var(--gb-lightest);
    font-size: 8px;
    opacity: 0.7;
    letter-spacing: 1px;
    margin-left: 4px;
  }


  .intro-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .intro-actions button {
    font-family: "Press Start 2P", monospace;
    font-size: 10px;
    padding: 12px 18px;
    background: var(--paper-light);
    color: var(--gb-darkest);
    border: 2px solid var(--gb-darkest);
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.15s;
  }
  .intro-actions button:hover {
    background: var(--gb-lightest);
    transform: translate(-1px, -1px);
    box-shadow: 2px 2px 0 var(--gb-darkest);
  }
  .intro-actions .btn-enter {
    background: var(--gb-dark);
    color: var(--paper-light);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .intro-actions .btn-enter.show {
    opacity: 1;
    pointer-events: auto;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-1px, -1px); box-shadow: 2px 2px 0 var(--gb-darkest); }
  }

  /* ========== SCENE 2: Map ========== */
  .scene-map { background: var(--paper); }

  /* Sticky marquee — sits above EP tabs, scrolls horizontally */
  .marquee {
    position: sticky;
    top: 0;
    z-index: 30;
    background: var(--gb-darkest);
    color: var(--gb-lightest);
    border-bottom: 2px solid var(--gold);
    padding: 9px 0;
    overflow: hidden;
    /* VT323 covers ASCII/emoji with the retro pixel feel; Chinese
       falls through to system CJK fonts so it actually looks readable.
       Mixed font stack means CJK chars naturally read larger than the
       VT323 ASCII glyphs at the same px — keep size small + zero letter-
       spacing so the visual weight gap is less obvious. */
    font-family: "VT323", "PingFang TC", "Hiragino Sans CNS", "Noto Sans TC", "Microsoft JhengHei", monospace;
    font-size: 15px;
    line-height: 1.1;
    letter-spacing: 0;
    box-shadow: 0 2px 0 var(--paper-edge);
  }
  .marquee-track {
    display: inline-block;
    white-space: nowrap;
    padding-left: 100%;
    animation: marqueeScroll var(--marquee-duration, 40s) linear infinite;
  }
  .marquee:hover .marquee-track,
  .marquee:active .marquee-track { animation-play-state: paused; }
  .marquee-item {
    display: inline-block;
    padding: 0 28px;
    border-right: 1px dashed var(--gold-deep);
  }
  .marquee-item a {
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid var(--gold);
  }
  .marquee-item a:hover { color: var(--gb-lightest); }
  @keyframes marqueeScroll {
    /* translateX (not translate3d) — translate3d forces a GPU compositor
       layer that some screen-recording tools (QuickTime / macOS built-in)
       skip when capturing the main framebuffer, making the marquee look
       blank in the recording. translateX still GPU-accelerates but doesn't
       force layer promotion, so the recorder sees it. */
    0%   { transform: translateX(0); }
    100% { transform: translateX(-100%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .marquee-track { animation: none; padding-left: 0; }
  }

  .map-topbar {
    display: flex;
    justify-content: flex-start;
    padding: 12px 0 0;
  }
  .map-back-intro {
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 8px 12px;
    background: var(--paper-light);
    color: var(--ink);
    border: 2px solid var(--gb-darkest);
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--paper-edge);
  }
  .map-back-intro:hover {
    background: var(--gb-lightest);
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--gb-darkest);
  }

  /* EP picker tabs — pixel button bar */
  .ep-tabs {
    display: flex;
    gap: 6px;
    margin: 8px 0 18px;
    padding: 4px;
    background: var(--paper-light);
    border: 2px solid var(--gb-darkest);
    box-shadow: 4px 4px 0 var(--paper-edge);
    overflow-x: auto;
  }
  .ep-tab {
    flex: 1;
    min-width: 0;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.3;
    background: transparent;
    color: var(--ink);
    border: 2px solid transparent;
    cursor: pointer;
    text-align: left;
  }
  .ep-tab:hover:not(.active) { background: var(--gb-lightest); }
  .ep-tab.active {
    background: var(--gb-light);
    color: var(--gb-darkest);
    border-color: var(--gb-darkest);
    box-shadow: 2px 2px 0 var(--gb-darkest);
  }
  .ep-tab .ep-tab-tag {
    display: inline-block;
    font-family: "Press Start 2P", monospace;
    font-size: 10px;
    letter-spacing: 1px;
    margin-right: 6px;
  }
  .ep-tab .ep-tab-sub {
    display: block;
    font-size: 11px;
    margin-top: 4px;
    opacity: .8;
  }

  /* EP intro — dialog box (matches .gate aesthetic) */
  .ep-intro {
    margin: 0 0 18px;
    padding: 16px 18px;
    background: var(--paper-light);
    border: 3px solid var(--gb-darkest);
    box-shadow: 5px 5px 0 var(--paper-edge);
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--ink);
    position: relative;
  }
  .ep-intro::before {
    content: "";
    position: absolute;
    top: -10px;
    left: 22px;
    width: 14px;
    height: 14px;
    background: var(--gb-light);
    border: 2px solid var(--gb-darkest);
  }

  /* Vault-vote song nodes — reuse .node + voted modifier */
  .node.vault-song .node-icon {
    font-family: "VT323", monospace;
    font-size: 22px;
    background: var(--gb-light);
  }
  .node.vault-song.voted {
    border-color: var(--gb-dark);
    background: var(--gb-lightest);
  }
  .node.vault-song.voted .node-icon {
    background: var(--gold);
    color: var(--gb-darkest);
  }
  .node-meta {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 6px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .vote-bar {
    flex: 1;
    min-width: 70px;
    height: 6px;
    background: var(--paper-edge);
    position: relative;
    margin: 0 6px;
  }
  .vote-bar > div {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--gb-mid);
  }
  .voted-tag {
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    color: var(--gold-deep);
    letter-spacing: 1px;
  }

  .vote-budget {
    text-align: center;
    font-family: "Press Start 2P", monospace;
    font-size: 10px;
    color: var(--ink-soft);
    margin: 4px 0 14px;
    letter-spacing: 2px;
  }
  .vote-budget b { color: var(--gb-darkest); font-size: 12px; }

  /* Village progress bar — L4 召喚陣 門檻 */
  .village-progress {
    margin-top: 16px;
    padding: 14px;
    background: var(--paper-light);
    border: 2px solid var(--gb-darkest);
    box-shadow: 3px 3px 0 var(--paper-edge);
  }
  .village-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .village-label {
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    color: var(--gb-darkest);
    letter-spacing: 1px;
  }
  .village-count {
    font-family: "VT323", monospace;
    font-size: 18px;
    color: var(--gold-deep);
    letter-spacing: 1px;
  }
  .village-bar {
    height: 14px;
    background: var(--paper-edge);
    border: 2px solid var(--gb-darkest);
    position: relative;
    overflow: hidden;
  }
  .village-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--gb-mid);
    transition: width 0.5s ease;
  }
  .village-msg {
    margin: 8px 0 0;
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.5;
  }
  .village-msg-done { color: var(--gb-darkest); font-weight: bold; }

  /* ========== Devlog feed (邊做邊丟) ========== */
  .devlog {
    margin-top: 28px;
    padding: 18px 16px 14px;
    background: var(--paper-light);
    border: 3px solid var(--gb-darkest);
    box-shadow: 5px 5px 0 var(--paper-edge);
    position: relative;
  }
  .devlog::before {
    content: "";
    position: absolute;
    top: -10px;
    right: 22px;
    width: 14px;
    height: 14px;
    background: var(--gold);
    border: 2px solid var(--gb-darkest);
  }
  .devlog-title {
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    color: var(--gb-darkest);
    letter-spacing: 2px;
    margin: 0 0 4px;
  }
  .devlog-sub {
    font-size: 12px;
    color: var(--ink-soft);
    margin: 0 0 14px;
  }
  .devlog-entry {
    padding: 12px;
    margin-bottom: 8px;
    background: var(--paper);
    border: 2px solid var(--paper-edge);
  }
  .devlog-entry:last-child { margin-bottom: 0; }
  .devlog-entry-meta {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    align-items: center;
  }
  .devlog-entry-icon { font-size: 14px; }
  .devlog-entry-date {
    font-family: "VT323", monospace;
    font-size: 14px;
    color: var(--gold-deep);
    letter-spacing: 1px;
  }
  .devlog-entry-type {
    font-family: "Press Start 2P", monospace;
    font-size: 8px;
    letter-spacing: 1px;
    color: var(--ink-soft);
    margin-left: auto;
  }
  .devlog-entry-title {
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .devlog-body {
    font-size: 13px;
    line-height: 1.65;
    color: var(--ink);
    margin: 0;
    white-space: pre-wrap;
  }
  .devlog-lyric {
    font-family: "VT323", monospace;
    font-size: 18px;
    line-height: 1.7;
    color: var(--gb-darkest);
    margin: 4px 0 0;
    padding: 8px 12px;
    background: var(--gb-lightest);
    white-space: pre-wrap;
  }
  .devlog-link {
    display: inline-block;
    font-size: 13px;
    color: var(--gold-deep);
    border-bottom: 1px solid var(--gold);
    padding-bottom: 2px;
    text-decoration: none;
    margin-top: 4px;
  }
  .devlog-link:hover {
    color: var(--gb-darkest);
    border-color: var(--gb-darkest);
  }
  .devlog-empty {
    font-size: 12px;
    color: var(--ink-soft);
    font-style: italic;
    text-align: center;
    padding: 8px 0;
  }

  .map-header {
    text-align: center;
    padding: 32px 0 16px;
    border-bottom: 1px dashed var(--paper-edge);
    margin-bottom: 22px;
  }
  .map-header .pixel-title {
    font-family: "Press Start 2P", monospace;
    font-size: 14px;
    color: var(--gb-darkest);
    letter-spacing: 2px;
    margin: 0 0 10px;
    line-height: 1.6;
  }
  .map-header .sub {
    font-size: 13px;
    color: var(--ink-soft);
    letter-spacing: 3px;
    margin: 0;
  }
  .map-header .status {
    margin-top: 14px;
    font-family: "VT323", monospace;
    font-size: 16px;
    color: var(--gb-dark);
  }
  .map-header .class-tag {
    display: inline-block;
    padding: 3px 9px;
    background: var(--gb-light);
    border: 2px solid var(--gb-darkest);
    color: var(--gb-darkest);
    font-size: 12px;
    letter-spacing: 1px;
    margin-left: 6px;
  }
  .map-header .class-tag.gold {
    background: var(--gold-deep);
    border-color: var(--ink);
    color: var(--paper-light);
    letter-spacing: 2px;
    font-weight: 600;
    box-shadow:
      inset 1px 1px 0 rgba(255, 240, 200, 0.2),
      2px 2px 0 var(--ink);
  }

  .map-section-title {
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    color: var(--gb-darkest);
    letter-spacing: 2px;
    margin: 0 0 6px;
  }
  .map-section-note {
    font-size: 12px;
    color: var(--ink-soft);
    margin: 0 0 18px;
    letter-spacing: 1px;
  }

  .world-map {
    position: relative;
    padding: 16px 12px;
    background: var(--paper-light);
    border: 2px solid var(--gold);
    box-shadow: 3px 3px 0 var(--paper-edge);
    margin-bottom: 36px;
  }

  .node {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 12px;
    margin-bottom: 10px;
    background: var(--paper);
    border: 2px solid var(--paper-edge);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    -webkit-tap-highlight-color: rgba(139, 172, 15, 0.3);
  }
  .node:active:not(.locked) {
    transform: scale(0.98);
  }
  .node:hover:not(.locked) {
    border-color: var(--gb-dark);
    background: var(--gb-lightest);
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--gb-darkest);
  }
  .node.locked { cursor: not-allowed; opacity: 0.55; }
  .node.cleared { border-color: var(--gb-dark); background: var(--gb-lightest); }

  .node-icon {
    width: 44px; height: 44px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Press Start 2P", monospace;
    font-size: 12px;
    background: var(--gb-light);
    border: 2px solid var(--gb-darkest);

  /* Gate (Email) */

  .gate .gate-sub {

    color: var(--ink-soft);
    margin: 0 0 6px;

  .gate .gate-note {

    color: var(--ink-soft);
    margin: 0 0 16px;

  .gate .gate-form {

  .gate input[type="email"]:focus { outline: none; background: var(--gb-lightest); }
  .gate button.gate-submit {
    padding: 10px 18px;
    font-family: "Press Start 2P", monospace;
    font-size: 10px;
    background: var(--gb-darkest);
    color: var(--gb-lightest);
    border: 2px solid var(--gb-darkest);
    cursor: pointer;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .gate .success {
    display: none;
    padding: 12px;
    background: var(--gb-lightest);
    border: 2px solid var(--gb-dark);

    font-size: 18px;
    margin-top: 12px;

  footer {
    margin-top: 40px;

    font-size: 8px;
    margin-top: 12px;
    letter-spacing: 2px;
    color: var(--paper-edge);
  }

  /* ========== SCENE 3: Level ========== */
  .scene-level {
    background: var(--paper);
  }
  .level-topbar {
    position: sticky;
    top: 0;
    background: var(--paper);
    border-bottom: 2px solid var(--gb-darkest);
    padding: 12px 16px;

    align-items: center;
    gap: 12px;
    z-index: 10;
  }
  .level-topbar .back-btn {
    font-family: "Press Start 2P", monospace;

  .level-topbar .back-btn:hover { background: var(--gb-dark); }

  .level-body {

  .level-body .level-tag {

  .audio-block {

    background: var(--gb-lightest);
    border: 2px solid var(--gb-darkest);
  }
  .audio-block .audio-title {
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    color: var(--gb-darkest);
    margin-bottom: 10px;

  .audio-block .tone-controls {
    display: flex;

    align-items: center;

  .audio-block button.tone-btn {
    font-family: "VT323", monospace;
    font-size: 17px;

  .audio-block .tone-meta {

  .missing-piece {

  .missing-piece::before {

  @keyframes glitch {
    0%, 90%, 100% { transform: translate(0, 0); opacity: 1; }

  .missing-piece .mp-caption {

  .missing-piece.filled::before {

  .missing-piece.filled {

    background: var(--gb-lightest);
  }

  .branch-block {
    padding: 16px;
    margin-bottom: 22px;
    background: var(--paper-light);
    border: 2px solid var(--paper-edge);
  }
  .branch-block .branch-title {
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    color: var(--gold-deep);
    margin-bottom: 10px;
    letter-spacing: 1.5px;
  }
  .branch-block .branch-locked {
    font-family: "VT323", monospace;
    font-size: 17px;
    color: var(--ink-soft);
    text-align: center;
    padding: 18px 0;
    letter-spacing: 1px;
  }
  .branch-block .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .branch-block .choice {
    padding: 14px;
    border: 2px solid var(--paper-edge);
    background: var(--paper);
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
  }
  .branch-block .choice:hover {
    border-color: var(--gb-dark);
    background: var(--gb-lightest);
  }
  .branch-block .choice.picked {
    border-color: var(--gb-dark);
    background: var(--gb-light);
    color: var(--gb-darkest);
  }
  .vote-results {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--paper-edge);
  }
  .vote-results-title {
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    color: var(--gb-dark);
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }
  .vote-row {
    display: grid;
    grid-template-columns: 24px 1fr auto;
    gap: 10px;
    align-items: center;
    margin-bottom: 8px;
  }
  .vote-label {
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    color: var(--gb-darkest);
    text-align: center;
  }
  .vote-bar-wrap {
    height: 16px;
    background: var(--paper);
    border: 2px solid var(--gb-darkest);
    position: relative;
    overflow: hidden;
    padding: 1px;
  }
  .vote-bar {
    height: 100%;
    background-image: linear-gradient(90deg, var(--gb-dark) 50%, var(--gb-mid) 50%);
    background-size: 8px 100%;
    transition: width 0.7s ease;
    min-width: 2px;
  }
  .vote-pct {
    font-family: "VT323", monospace;
    font-size: 15px;
    color: var(--gb-dark);
    letter-spacing: 1px;
    white-space: nowrap;
    min-width: 88px;
    text-align: right;
  }
  .vote-loading {
    font-family: "VT323", monospace;
    font-size: 15px;
    color: var(--ink-soft);
    text-align: center;
    padding: 6px 0;
  }

  /* Action block — per-level completion task */
  .action-block {
    padding: 18px;
    margin-bottom: 22px;
    background: var(--paper-light);
    border: 2px solid var(--gold);
    box-shadow: 3px 3px 0 var(--paper-edge);
  }
  .action-block .action-title {
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    color: var(--gold-deep);
    margin-bottom: 12px;
    letter-spacing: 1.5px;
  }
  .action-block.cleared {
    background: var(--gb-lightest);
    border-color: var(--gb-dark);
  }
  .action-block.cleared .action-title {
    color: var(--gb-dark);
  }
  .action-prompt {
    font-family: "VT323", monospace;
    font-size: 17px;
    color: var(--ink);
    line-height: 1.6;
    margin: 0 0 12px;
  }
  .action-cleared-msg {
    font-family: "VT323", monospace;
    font-size: 18px;
    color: var(--gb-dark);
    margin: 0;
    line-height: 1.6;
  }
  .action-btn {
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    padding: 14px 18px;
    background: var(--gb-dark);
    color: var(--paper-light);
    border: 2px solid var(--gb-darkest);
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.15s;
    width: 100%;
  }
  .action-btn:hover {
    background: var(--gb-darkest);
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--paper-edge);
  }
  .action-text {
    width: 100%;
    padding: 10px 12px;
    font-family: "VT323", monospace;
    font-size: 17px;
    background: var(--paper);
    border: 2px solid var(--gb-darkest);
    color: var(--ink);
    margin-bottom: 10px;
    resize: vertical;
    min-height: 70px;
  }
  .action-text:focus { outline: none; background: var(--gb-lightest); }
  .listen-meter {
    height: 22px;
    background: var(--paper);
    border: 2px solid var(--gb-darkest);
    padding: 2px;
    position: relative;
    margin-top: 8px;
  }
  .listen-meter .listen-bar {
    height: 100%;
    background-image: linear-gradient(90deg, var(--gb-dark) 50%, var(--gb-mid) 50%);
    background-size: 8px 100%;
    transition: width 0.4s ease;
  }
  .listen-meter .listen-label {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "VT323", monospace;
    font-size: 14px;
    color: var(--gb-darkest);
    letter-spacing: 1px;
  }

  .level-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .level-actions button {
    flex: 1;
    min-width: 140px;
    padding: 14px;
    font-family: "PingFang TC", sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    border: 2px solid var(--gb-darkest);
  }
  .btn-primary { background: var(--gb-dark); color: var(--paper-light); }
  .btn-primary:hover { background: var(--gb-darkest); }
  .btn-secondary { background: var(--paper); color: var(--ink); }
  .btn-secondary:hover { background: var(--gb-lightest); }

  /* Action-btn secondary variant for 加入製作委員會 */
  .action-btn.secondary {
    background: var(--paper-light);
    color: var(--gold-deep);
    border-color: var(--gold-deep);
    font-weight: 500;
  }
  .action-btn.secondary:hover {
    background: var(--gb-lightest);
    color: var(--ink);
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--gold);
  }

  /* ========== Paywall Modal ========== */
  .paywall-modal {
    position: fixed;
    inset: 0;
    background: rgba(15, 56, 15, 0.65);
    backdrop-filter: blur(3px);
    display: none;
    align-items: flex-start;
    justify-content: center;
    z-index: 1000;
    padding: 32px 18px;
    overflow-y: auto;
    animation: fadeIn 0.25s ease;
  }
  .paywall-modal.open { display: flex; }

  /* Submit modal — Tally form embed (玩家投稿 textarea + 檔案上傳) */
  .submit-modal {
    position: fixed;
    inset: 0;
    background: rgba(15, 56, 15, 0.7);
    backdrop-filter: blur(3px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1100;
    padding: 24px 12px;
    animation: fadeIn 0.25s ease;
  }
  .submit-modal.open { display: flex; }
  .submit-card {
    width: 100%;
    max-width: 640px;
    height: 88vh;
    max-height: 760px;
    background: var(--paper-light);
    border: 3px solid var(--gb-darkest);
    box-shadow: 6px 6px 0 var(--ink);
    padding: 36px 8px 8px;
    position: relative;
    display: flex;
    flex-direction: column;
  }

    flex: 1;
    width: 100%;
    border: none;
    background: var(--paper-light);
  }
  .submit-close {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 32px;
    height: 32px;
    background: var(--paper);
    border: 2px solid var(--gb-darkest);
    font-family: "Press Start 2P", monospace;
    font-size: 14px;
    cursor: pointer;
    z-index: 2;
  }
  .submit-close:hover { background: var(--gb-lightest); }
  .paywall-card {
    max-width: 440px;
    width: 100%;
    background: var(--paper-light);
    border: 3px solid var(--gold-deep);
    box-shadow: 6px 6px 0 var(--ink);
    padding: 36px 28px 28px;
    position: relative;
    animation: slideIn 0.3s ease;
  }
  .paywall-close {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 32px;
    height: 32px;
    background: var(--paper);
    border: 2px solid var(--gb-darkest);
    font-family: "Press Start 2P", monospace;
    font-size: 14px;
    cursor: pointer;
    color: var(--gb-darkest);
  }
  .paywall-close:hover { background: var(--gb-lightest); }
  .paywall-eyebrow {
    font-family: "Press Start 2P", monospace;
    font-size: 10px;
    color: var(--gold-deep);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .paywall-title {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 2px;
    color: var(--ink);
    margin: 0 0 18px;
  }
  .paywall-teaser {
    font-family: "VT323", monospace;
    font-size: 18px;
    color: var(--ink);
    background: var(--gb-lightest);
    border-left: 4px solid var(--gb-dark);
    padding: 12px 16px;
    margin: 0 0 20px;
    line-height: 1.65;
  }
  .paywall-bundle {
    border-top: 1px dashed var(--paper-edge);
    border-bottom: 1px dashed var(--paper-edge);
    padding: 16px 0;
    margin-bottom: 20px;
  }
  .paywall-bundle-title {
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    color: var(--gb-darkest);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .paywall-bundle-items {
    list-style: none;
    padding: 0;
    margin: 0;
    font-family: "VT323", monospace;
    font-size: 17px;
    line-height: 1.9;
    color: var(--ink);
  }
  .paywall-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .paywall-price {
    font-family: "Press Start 2P", monospace;
    font-size: 13px;
    color: var(--gold-deep);
    letter-spacing: 2px;

  }
  .paywall-checkout {
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    padding: 14px 16px;
    background: var(--gold-deep);
    color: var(--paper-light);
    border: 2px solid var(--ink);
    cursor: pointer;
    letter-spacing: 2px;
    flex: 1;
    min-width: 160px;
    transition: all 0.15s;
  }
  .paywall-checkout:hover:not(:disabled) {
    background: var(--ink);
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--gold);
  }
  .paywall-checkout:disabled {
    background: var(--paper-edge);
    color: var(--ink-soft);
    border-color: var(--paper-edge);
    cursor: not-allowed;
    letter-spacing: 1px;
    font-size: 9px;
    padding: 10px 12px;
  }
  .paywall-soon {
    font-family: "VT323", monospace;
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0;
    padding: 6px 0 0;
    width: 100%;
    line-height: 1.5;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(40px);
    background: var(--gb-darkest);
    color: var(--gb-lightest);
    padding: 12px 20px;
    font-family: "VT323", monospace;
    font-size: 18px;
    border: 2px solid var(--gb-light);
    box-shadow: 3px 3px 0 var(--gb-dark);

    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    max-width: 90%;
    text-align: center;

  /* Admin link in footer */
  .admin-link-footer {
    font-family: "Press Start 2P", monospace;

  }

  @media (max-width: 600px) {
    .wrap { padding: 22px 14px 80px; }
    .map-header .pixel-title { font-size: 12px; }

    .node-title { font-size: 14px; }
    .node-icon { width: 38px; height: 38px; font-size: 10px; }

    .branch-block .choices { grid-template-columns: 1fr; }

  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

<!-- ============ SCENE 1: INTRO ============ -->

<script>
// ============================================================
// FALLBACK CONTENT (used if fetch fails)
// ============================================================
const DEFAULT_CONTENT = {
  meta: { pixelTitle: "CHEN TSE-HAO", subtitle: "H A O · の 世 界" },
  speaker: "HAO · 陳則皞",
  intro: [
    "嘿,好久沒聯絡。",
    "這不是一張 EP,是一款遊戲。",
    "五個關卡、一張世界地圖 — 陪我把歌搬出來。",
    "不用付費,也能看;想決定走向,就拿鑰匙。",
    "點「進入世界」往下走。"
  ],
  mapTitle: "▸ 世界地圖",
  mapNote: "每個節點是一首歌、一個章節、或一個企劃。點進去看關卡細節。",
  gate: {
    title: "加入村民",
    sub: "免費。我會不定期寄一些手寫信、碎念、或發行前的 Demo。",
    note: "你也可以把生活垃圾丟回來。我不一定會回,但我在。",
    successText: "✓ 你已進入村莊。身份升級為「村民」。"
  },
  classes: { guest: "訪客", villager: "村民" },
  levels: []
};

// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'hao-rpg-v2';
const defaultState = {
  cleared: [], filled: [], hasKey: false, picks: {},
  email: null, class: 'guest', introSeen: false,
  currentEpId: 'ep1',
  perEp: {},
};

// ============================================================
// MULTI-EP HELPERS
// EP1 keeps using root-level state (cleared/filled/etc) so
// existing players don't lose progress. EP2+ stores under
// state.perEp[epId]. Schema-driven dispatch by ep.type.
// ============================================================
function getEps() {
  return Array.isArray(CONTENT.eps) && CONTENT.eps.length
    ? CONTENT.eps
    : [{ id: 'ep1', type: 'level-quest', title: CONTENT.meta?.worldName || 'EP1', shortTag: 'EP1', useRootData: true }];
}
function getCurrentEp() {
  const eps = getEps();
  const wanted = state.currentEpId || CONTENT.currentEpId || eps[0].id;
  return eps.find(e => e.id === wanted) || eps[0];
}
function getEpById(epId) {
  return getEps().find(e => e.id === epId);
}
function epDataLevels(ep) {
  // level-quest type: prefer ep.levels, fallback to root .levels for ep1 (useRootData)
  if (ep.useRootData) return CONTENT.levels || [];
  return ep.levels || [];
}
function epPerEpState(epId) {
  state.perEp = state.perEp || {};
  state.perEp[epId] = state.perEp[epId] || {};
  return state.perEp[epId];
}
function switchEp(epId) {
  if (state.currentEpId === epId) { navigate('#map'); return; }
  state.currentEpId = epId;
  saveState();
  // Hash uses #ep<id> form so refresh stays on the chosen EP.
  navigate('#' + epId);
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { ...defaultState };
    return { ...defaultState, ...JSON.parse(raw) };
  } catch { return { ...defaultState }; }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
let state = loadState();
let CONTENT = DEFAULT_CONTENT;

// ============================================================
// CONTENT LOADER
// ============================================================
async function loadContent() {
  try {
    const res = await fetch('content.json?' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    CONTENT = await res.json();
  } catch (e) {
    console.warn('Using default content:', e);
    CONTENT = DEFAULT_CONTENT;
  }
  applyContent();
}

function applyContent() {
  // Site name — drives <title>, OG share preview, and fallbacks.
  const siteName = CONTENT.meta?.worldName || '陳則皞の世界';
  document.title = siteName;
  const ogTitle = document.querySelector('meta[property="og:title"]');
  if (ogTitle) ogTitle.setAttribute('content', siteName);
  const ogDesc = document.querySelector('meta[property="og:description"]');
  if (ogDesc && CONTENT.meta?.subtitle) ogDesc.setAttribute('content', CONTENT.meta.subtitle);

  document.getElementById('pixelTitle').textContent = CONTENT.meta?.pixelTitle || 'CHEN TSE-HAO';
  document.getElementById('subtitle').textContent = CONTENT.meta?.subtitle || '';
  document.getElementById('introSpeaker').textContent = (CONTENT.speaker || 'HAO').split(' ')[0];
  document.getElementById('mapTitleEl').textContent = CONTENT.mapTitle || '▸ 世界地圖';
  document.getElementById('mapNoteEl').textContent = CONTENT.mapNote || '';
  document.getElementById('gateTitle').textContent = CONTENT.gate?.title || '加入村民';
  document.getElementById('gateSub').textContent = CONTENT.gate?.sub || '';
  document.getElementById('gateNote').textContent = CONTENT.gate?.note || '';
  document.getElementById('gateSuccess').textContent = CONTENT.gate?.successText || '✓';
  renderIntroProgress();
  renderNodes();
  renderSocials();
  updateClass();
}

// ============================================================
// DEVLOG (邊做邊丟) — flat list of entries with attachTo:
//   ""             = global (renders on every map)
//   "ep1" / "ep2"  = renders on that EP's map only
//   "ep1/L1" etc.  = renders only on that level/song detail page
// ============================================================
function renderDevlog(containerId, attachToFilter) {
  const box = document.getElementById(containerId);
  if (!box) return;
  const dl = CONTENT.devlog || {};
  const all = (dl.entries || []).slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const entries = all.filter(attachToFilter);
  if (!entries.length) { box.innerHTML = ''; return; }

  let html = `<div class="devlog">`;
  html += `<h3 class="devlog-title">${escapeHtml(dl.title || '📓 製作日誌')}</h3>`;
  if (dl.subtitle) html += `<p class="devlog-sub">${escapeHtml(dl.subtitle)}</p>`;
  entries.forEach(e => { html += renderDevlogEntry(e); });
  html += `</div>`;
  box.innerHTML = html;
}

function renderDevlogEntry(e) {
  const typeIcon = ({ text: '✎', lyric: '♬', audio: '🎙', link: '🔗' })[e.type] || '·';
  let content = '';
  if (e.title) content += `<div class="devlog-entry-title">${escapeHtml(e.title)}</div>`;
  if (e.type === 'lyric') {
    content += `<div class="devlog-lyric">${escapeHtml(e.body || '')}</div>`;
  } else if (e.type === 'audio' && e.mediaUrl) {
    if (e.body) content += `<p class="devlog-body">${escapeHtml(e.body)}</p>`;
    content += `<audio controls preload="metadata" src="${escapeHtml(e.mediaUrl)}" style="width:100%;margin-top:8px;"></audio>`;
  } else if (e.type === 'link' && e.mediaUrl) {
    if (e.body) content += `<p class="devlog-body">${escapeHtml(e.body)}</p>`;
    content += `<a class="devlog-link" href="${escapeHtml(e.mediaUrl)}" target="_blank" rel="noopener">前往 ↗</a>`;
  } else {
    content += `<p class="devlog-body">${escapeHtml(e.body || '')}</p>`;
  }
  return `
    <article class="devlog-entry">
      <div class="devlog-entry-meta">
        <span class="devlog-entry-icon">${typeIcon}</span>
        <span class="devlog-entry-date">${escapeHtml(e.date || '')}</span>
        <span class="devlog-entry-type">${escapeHtml(String(e.type || '').toUpperCase())}</span>
      </div>
      ${content}
    </article>
  `;
}

function devlogFilterForMap(epId) {
  return (e) => !e.attachTo || e.attachTo === epId;
}
function devlogFilterForItem(epId, itemId) {
  const target = epId + '/' + itemId;
  return (e) => e.attachTo === target;
}

function renderSocials() {
  const box = document.getElementById('socialsBlock');
  if (!box) return;
  const s = CONTENT.socials || {};
  const items = [
    { key: 'podcast',        label: '🎙 Podcast' },
    { key: 'spotify',        label: '🎵 Spotify' },
    { key: 'applePodcasts',  label: '🎧 Apple Podcasts' },
    { key: 'ig',             label: '📷 IG' },
    { key: 'threads',        label: '🧵 Threads' },
    { key: 'portaly',        label: '🌿 Portaly(全部入口)' },
  ];
  const live = items.filter(it => s[it.key] && String(s[it.key]).trim());
  if (!live.length) { box.innerHTML = ''; return; }
  const heading = s.heading || '→ 外面找我';
  let html = `<p style="font-size:11px;letter-spacing:.15em;color:var(--gold-deep);margin-bottom:8px;">${escapeHtml(heading)}</p>`;
  html += '<p style="display:flex;flex-wrap:wrap;gap:6px 14px;font-size:13px;">';
  live.forEach(it => {
    html += `<a href="${escapeHtml(s[it.key])}" target="_blank" rel="noopener">${escapeHtml(it.label)}</a>`;
  });
  html += '</p>';
  box.innerHTML = html;
}

// ============================================================
// SCENE ROUTER (hash-based)
// ============================================================
function parseHash() {
  const h = (location.hash || '').replace(/^#/, '');
  if (!h) return { scene: 'intro' };
  // EP-prefixed: #ep1, #ep2, #ep1/L1, #ep2/S1
  const epMatch = h.match(/^(ep\d+)(?:\/(.+))?$/i);
  if (epMatch) {
    const epId = epMatch[1].toLowerCase();
    const item = epMatch[2];
    if (!item) return { scene: 'map', epId };
    return { scene: 'level', epId, levelId: item };
  }
  if (h === 'map') return { scene: 'map' };
  if (h.startsWith('level/')) return { scene: 'level', levelId: h.split('/')[1] };
  // Short forms (legacy): #L1 or #S1 — resolve under currentEpId
  if (/^[LS]\d+$/i.test(h)) return { scene: 'level', levelId: h };
  return { scene: 'intro' };
}

function switchScene(to, params = {}) {
  const current = document.querySelector('.scene.active');
  const next = document.querySelector(`.scene[data-scene="${to}"]`);
  if (!next) return;
  if (current === next) {
    if (to === 'level') renderLevel(params.levelId);
    return;
  }
  if (to === 'level') renderLevel(params.levelId);
  if (to === 'map') renderNodes();

  if (current) {
    current.classList.add('leaving');
    current.classList.remove('active');
    setTimeout(() => current.classList.remove('leaving'), 350);
  }
  next.classList.add('active');
  next.scrollTop = 0;
  // BGM: intro and map each have their own track; level stops music
  switchBgm(to === 'level' ? null : to);
}

function navigate(hash) {
  if (location.hash === hash) {
    handleHashChange();
  } else {
    location.hash = hash;
  }
}

function handleHashChange() {
  const raw = location.hash.replace(/^#/, '');
  if (!raw) {
    // Empty hash: first visit -> intro, returning -> map
    location.hash = state.introSeen ? 'map' : 'intro';
    return;
  }
  const parsed = parseHash();
  // EP switch via hash: persist into state so deep links survive reload.
  if (parsed.epId && parsed.epId !== state.currentEpId) {
    state.currentEpId = parsed.epId;
    saveState();
  }
  // If navigating back to intro, restart it so they can re-read
  if (parsed.scene === 'intro') restartIntro();
  switchScene(parsed.scene, { levelId: parsed.levelId, epId: parsed.epId });
}

window.addEventListener('hashchange', handleHashChange);

// ============================================================
// INTRO (typewriter)
// ============================================================
let introIndex = 0;
let introTyping = false;
let currentTypeIv = null;

function renderIntroProgress() {
  const box = document.getElementById('introProgress');
  box.innerHTML = '';
  const total = (CONTENT.intro || []).length;
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('span');
    dot.className = 'dot' + (i <= introIndex ? ' done' : '');
    box.appendChild(dot);
  }
}

function typeLine(line, cb) {
  const typedEl = document.getElementById('typedText');
  const dialog = document.getElementById('introDialog');
  introTyping = true;
  dialog.classList.remove('typed');
  typedEl.textContent = '';
  let i = 0;
  currentTypeIv = setInterval(() => {
    typedEl.textContent += line[i];
    i++;
    if (i >= line.length) {
      clearInterval(currentTypeIv);
      currentTypeIv = null;
      introTyping = false;
      dialog.classList.add('typed');
      cb && cb();
    }
  }, 45);
}

function advanceIntro() {
  const lines = CONTENT.intro || [];
  const dialog = document.getElementById('introDialog');
  const typedEl = document.getElementById('typedText');

  if (introTyping && currentTypeIv) {
    clearInterval(currentTypeIv);
    typedEl.textContent = lines[introIndex];
    dialog.classList.add('typed');
    introTyping = false;
    return;
  }
  introIndex++;
  if (introIndex >= lines.length) {
    introIndex = lines.length - 1;
    dialog.classList.add('last');
    document.getElementById('btnEnter').classList.add('show');
    renderIntroProgress();
    return;
  }
  renderIntroProgress();
  typeLine(lines[introIndex]);
}

function restartIntro() {
  introIndex = 0;
  document.getElementById('introDialog').classList.remove('last');
  document.getElementById('btnEnter').classList.remove('show');
  renderIntroProgress();
  if (currentTypeIv) clearInterval(currentTypeIv);
  const lines = CONTENT.intro || [];
  if (lines.length) typeLine(lines[0]);
}

document.getElementById('introDialog').addEventListener('click', () => {
  // Retry BGM on user gesture (first page-load autoplay is blocked)
  if (activeBgmScene && bgmEls[activeBgmScene] && bgmEls[activeBgmScene].paused) {
    switchBgm(activeBgmScene);
  } else if (!activeBgmScene) {
    bgmOnFirstGesture();
  }
  advanceIntro();
});
document.getElementById('btnSkip').addEventListener('click', () => {
  state.introSeen = true; saveState();
  navigate('#map');
});
document.getElementById('btnBackToIntro').addEventListener('click', () => {
  // Returning player wants to re-read the opener — go back without resetting introSeen.
  navigate('#intro');
});
document.getElementById('btnEnter').addEventListener('click', () => {
  state.introSeen = true; saveState();
  navigate('#map');
});

// ============================================================
// MAP / NODES
// ============================================================
function isUnlocked(level) {
  if (level.defaultUnlocked) return true;
  if (!level.unlockedBy) return false;
  if (level.unlockedBy === '__village__') return !!state.email;
  return state.cleared.includes(level.unlockedBy);
}

// ============================================================
// MARQUEE — sticky horizontal ticker on the map scene.
// Items repeat 2x in the track so the loop reads continuously
// before wrapping back to the start.
// ============================================================
const MARQUEE_SPEED = { slow: 60, normal: 40, fast: 22 };

function renderMarquee() {
  const box = document.getElementById('mapMarquee');
  if (!box) return;
  const m = CONTENT.marquee || {};
  const items = (m.items || []).filter(it => it && (it.text || '').trim());
  // Admin select round-trips the bool through a string, so accept both.
  const disabled = m.enabled === false || m.enabled === 'false';
  if (disabled || !items.length) {
    box.hidden = true;
    box.innerHTML = '';
    return;
  }
  // Duration scales with content length so longer feeds don't speed up the type.
  const charCount = items.reduce((n, it) => n + (it.text || '').length, 0);
  const baseSec = MARQUEE_SPEED[m.speed] || MARQUEE_SPEED.normal;
  const dur = Math.max(15, Math.round(baseSec * (charCount / 60)));
  const cells = items.map(it => {
    const txt = escapeHtml(it.text);
    return it.link
      ? `<span class="marquee-item"><a href="${escapeHtml(it.link)}" target="_blank" rel="noopener">${txt}</a></span>`
      : `<span class="marquee-item">${txt}</span>`;
  }).join('');
  // Repeat once so the visual loop reads as continuous.
  box.hidden = false;
  box.innerHTML = `<div class="marquee-track" style="--marquee-duration:${dur}s">${cells}${cells}</div>`;
}

function renderEpTabs() {
  const box = document.getElementById('epTabs');
  if (!box) return;
  const eps = getEps();
  // Hide tabs entirely if there's only one EP — no need to clutter the UI.
  if (eps.length < 2) { box.style.display = 'none'; return; }
  box.style.display = 'flex';
  box.innerHTML = '';
  const currentId = (state.currentEpId || CONTENT.currentEpId || eps[0].id);
  eps.forEach(ep => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'ep-tab' + (ep.id === currentId ? ' active' : '');
    btn.innerHTML = `<span class="ep-tab-tag">${escapeHtml(ep.shortTag || ep.id.toUpperCase())}</span>${escapeHtml(ep.title.split(' · ').slice(1).join(' · ') || ep.title)}<span class="ep-tab-sub">${escapeHtml(ep.subtitle || '')}</span>`;
    btn.addEventListener('click', () => switchEp(ep.id));
    box.appendChild(btn);
  });
}

function renderNodes() {
  // Always rebuild the marquee + EP picker first — they're map-scoped chrome.
  renderMarquee();
  renderEpTabs();
  const ep = getCurrentEp();
  // Per-EP intro blurb (vault-vote uses this; level-quest hides it).
  const introEl = document.getElementById('epIntro');
  if (introEl) {
    if (ep.type === 'vault-vote' && ep.intro) {
      introEl.style.display = 'block';
      introEl.textContent = ep.intro;
    } else {
      introEl.style.display = 'none';
      introEl.textContent = '';
    }
  }
  // Dispatch by EP type.
  const nodesEl = document.getElementById('nodes');
  const songsEl = document.getElementById('songsList');
  if (ep.type === 'vault-vote') {
    if (nodesEl) nodesEl.style.display = 'none';
    if (songsEl) { songsEl.style.display = 'block'; renderSongList(ep); }
    // Hide quest progress meter (it doesn't apply to voting).
    const pwrap = document.querySelector('.scene-map .progress-wrap');
    if (pwrap) pwrap.style.display = 'none';
    renderDevlog('devlogMap', devlogFilterForMap(ep.id));
    return;
  }
  // level-quest (default / EP1)
  if (songsEl) songsEl.style.display = 'none';
  const pwrap = document.querySelector('.scene-map .progress-wrap');
  if (pwrap) pwrap.style.display = '';
  if (!nodesEl) return;
  nodesEl.style.display = '';
  nodesEl.innerHTML = '';
  const levels = epDataLevels(ep);
  levels.forEach((lv) => {
    const unlocked = isUnlocked(lv);
    const cleared = state.cleared.includes(lv.id);
    const n = document.createElement('div');
    n.className = 'node' + (unlocked ? '' : ' locked') + (cleared ? ' cleared' : '');
    n.dataset.id = lv.id;
    n.innerHTML = `
      <div class="node-icon">${unlocked ? escapeHtml(lv.num) : '?'}</div>
      <div class="node-body">
        <p class="node-title"><span class="num">${escapeHtml(lv.num)}</span>${unlocked ? escapeHtml(lv.title) : '???'}</p>
        <p class="node-desc">${unlocked ? escapeHtml(lv.desc) : '尚未解鎖。完成前一關才看得到這裡。'}</p>
      </div>
      <span class="node-badge ${lv.tag || 'main'}">${(lv.tag || 'main').toUpperCase()}</span>
    `;
    if (unlocked) {
      n.addEventListener('click', () => navigate('#' + ep.id + '/' + lv.id));
    } else {
      n.addEventListener('click', () => toast('這裡還沒開 — 先往前推進。'));
    }
    nodesEl.appendChild(n);
  });
  const cleared = state.cleared.length;
  const total = levels.length;
  const pt = document.getElementById('progressText');
  const pf = document.getElementById('progressFill');
  if (pt) pt.textContent = `${cleared} / ${total}`;
  if (pf) pf.style.width = total ? `${(cleared / total) * 100}%` : '0%';
  // Devlog feed for this EP's map (global entries + ep-tagged entries).
  renderDevlog('devlogMap', devlogFilterForMap(ep.id));
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============================================================
// VAULT-VOTE (EP2) — songs list + per-song detail + voting
// State: per-EP under state.perEp[epId] = { votes: {songId: bool}, voteCount }
// Public tally via abacus shared counter (one key per song).
// ============================================================
function epVoteState(epId) {
  const s = epPerEpState(epId);
  s.votes = s.votes || {};
  return s;
}

function votedSongIds(epId) {
  const s = epVoteState(epId);
  return Object.keys(s.votes).filter(k => s.votes[k]);
}

function songVoteHitKey(ep, song) {
  const ns = ep.shareCounterNs || ('haohao-' + ep.id + '-vault');
  return ns + '__' + (song.voteKey || song.id);
}

async function fetchSongTally(ep, song) {
  const key = songVoteHitKey(ep, song);
  try {
    const res = await fetch(`${POLL_API}/get/${pollNs()}/${encodeURIComponent(key)}`);
    if (!res.ok) return 0;
    const data = await res.json();
    return data.value || 0;
  } catch { return 0; }
}

async function bumpSongTally(ep, song) {
  const key = songVoteHitKey(ep, song);
  try {
    const res = await fetch(`${POLL_API}/hit/${pollNs()}/${encodeURIComponent(key)}`);
    if (!res.ok) return null;
    const data = await res.json();
    return data.value || 0;
  } catch { return null; }
}

async function renderSongList(ep) {
  const box = document.getElementById('songsList');
  if (!box) return;
  const songs = ep.songs || [];
  const myVotes = votedSongIds(ep.id);
  const cap = ep.voteCap || 3;

  // Header: vote budget + deadline (pixel-font tag bar).
  let html = `<div class="vote-budget">YOUR VOTES <b>${myVotes.length}/${cap}</b>`;
  if (ep.voteDeadline) html += ` · DEADLINE ${escapeHtml(ep.voteDeadline)}`;
  html += `</div>`;

  // Use the same .node structure as EP1 levels for visual consistency.
  songs.forEach((song, i) => {
    const voted = myVotes.includes(song.id);
    const num = String(i + 1).padStart(2, '0');
    html += `
      <div class="node vault-song${voted ? ' voted' : ''}" data-song="${escapeHtml(song.id)}">
        <div class="node-icon">${num}</div>
        <div class="node-body">
          <p class="node-title"><span class="num">S${i + 1}</span>${escapeHtml(song.title)}</p>
          <p class="node-desc">${escapeHtml(song.year || '')}${song.year ? ' · ' : ''}${escapeHtml(song.status || '')}</p>
          <div class="node-meta">
            <span data-tally="${escapeHtml(song.id)}">— 票</span>
            <div class="vote-bar"><div data-tallybar="${escapeHtml(song.id)}" style="width:0%"></div></div>
            ${voted ? '<span class="voted-tag">★ VOTED</span>' : ''}
          </div>
        </div>
        <span class="node-badge ${voted ? 'main' : 'side'}">DEMO</span>
      </div>
    `;
  });

  box.innerHTML = html;
  box.querySelectorAll('.node.vault-song').forEach(card => {
    card.addEventListener('click', () => {
      const sid = card.dataset.song;
      navigate('#' + ep.id + '/' + sid);
    });
  });

  const tallies = await Promise.all(songs.map(s => fetchSongTally(ep, s)));
  const max = Math.max(1, ...tallies);
  songs.forEach((s, i) => {
    const t = tallies[i];
    const tEl = box.querySelector(`[data-tally="${CSS.escape(s.id)}"]`);
    const bEl = box.querySelector(`[data-tallybar="${CSS.escape(s.id)}"]`);
    if (tEl) tEl.textContent = t + ' 票';
    if (bEl) bEl.style.width = ((t / max) * 100).toFixed(1) + '%';
  });
}

function renderSong(ep, songId) {
  const song = (ep.songs || []).find(s => s.id === songId);
  if (!song) { navigate('#' + ep.id); return; }
  activeLevel = null; // vault-vote songs are not quest levels.
  // Reuse the existing level scene shell — we hand-render the action block.
  document.getElementById('topbarTitle').textContent = song.title;
  document.getElementById('levelTag').textContent = (ep.shortTag || ep.id.toUpperCase()) + ' · 未發行倉庫';
  document.getElementById('levelTitle').textContent = song.title;
  document.getElementById('levelSub').textContent = song.year ? (song.year + ' · ' + (song.status || '')) : (song.status || '');
  document.getElementById('levelStory').textContent = song.backstory || '';
  // Hide quest-only blocks (tone bar, missing-piece, branch).
  const audioBlock = document.querySelector('.scene-level .audio-block');
  if (audioBlock) audioBlock.style.display = 'none';
  ['missingPiece', 'branchBlock'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  });
  const ab = document.getElementById('actionBlock');
  const titleEl = document.getElementById('actionTitle');
  const body = document.getElementById('actionBody');
  ab.style.display = 'block';
  ab.classList.remove('cleared');
  titleEl.textContent = '▸ 投這首一票';
  body.innerHTML = '';

  const myVotes = votedSongIds(ep.id);
  const voted = myVotes.includes(song.id);
  const cap = ep.voteCap || 3;
  const remaining = cap - myVotes.length;

  // Demo audio (if present) — same <audio> pattern as levels.
  if (song.demoUrl) {
    const audio = document.createElement('audio');
    audio.controls = true;
    audio.preload = 'metadata';
    audio.src = song.demoUrl;
    audio.style.cssText = 'width:100%;margin-bottom:12px;';
    body.appendChild(audio);
  } else {
    const noaudio = document.createElement('p');
    noaudio.className = 'action-prompt';
    noaudio.style.cssText = 'font-style:italic;color:var(--ink-soft);margin-bottom:12px;';
    noaudio.textContent = '(demo 音檔還沒上傳 · 你還是可以投票表態)';
    body.appendChild(noaudio);
  }

  const tallyP = document.createElement('p');
  tallyP.style.cssText = 'font-size:13px;color:var(--ink-soft);margin-bottom:10px;';
  tallyP.innerHTML = '目前票數:<b data-livetally>—</b> 票';
  body.appendChild(tallyP);
  fetchSongTally(ep, song).then(t => {
    const b = body.querySelector('[data-livetally]');
    if (b) b.textContent = ' ' + t + ' ';
  });

  const btn = document.createElement('button');
  btn.className = 'action-btn';
  if (voted) {
    btn.textContent = '✓ 你已投這首 (取消)';
    btn.addEventListener('click', () => unvoteForSong(ep, song));
  } else if (remaining <= 0) {
    btn.disabled = true;
    btn.textContent = `★ 你的 3 票已用完 (改投這首要先取消另一首)`;
  } else {
    btn.textContent = `▶ 投這首一票 (還剩 ${remaining - 1} 票)`;
    btn.addEventListener('click', () => voteForSong(ep, song));
  }
  body.appendChild(btn);

  const back = document.createElement('button');
  back.className = 'action-btn secondary';
  back.style.marginTop = '8px';
  back.textContent = '← 回 ' + (ep.shortTag || 'EP') + ' 倉庫';
  back.addEventListener('click', () => navigate('#' + ep.id));
  body.appendChild(back);

  // Endgame email CTA — vault-vote uses ep.endgame, fallback to root paywall.endgame.
  const endgameSrc = ep.endgame || (CONTENT.paywall && CONTENT.paywall.endgame) || null;
  if (endgameSrc) {
    appendVaultEndgameCTA(body, endgameSrc);
  }
  // (Submit button removed from EP2 — vault-vote is purely a voting channel.
  //  Lyrics-wall style submission only belongs in L3.)
  // Devlog entries attached to this song (e.g. lyric drafts, voice memos).
  renderDevlog('devlogLevel', devlogFilterForItem(ep.id, song.id));
}

function appendVaultEndgameCTA(body, eg) {
  const card = document.createElement('div');
  card.style.cssText = 'margin-top:18px;padding:14px 16px;border:2px solid var(--gb-darkest);background:var(--gb-lightest);';
  const h = document.createElement('div');
  h.style.cssText = 'font-weight:bold;font-size:14px;margin-bottom:8px;color:var(--gb-darkest);';
  h.textContent = eg.title || eg.headline || '🎵 投票結束時你會收到通知';
  card.appendChild(h);
  const p = document.createElement('p');
  p.style.cssText = 'font-size:12px;line-height:1.55;margin:0 0 10px 0;color:var(--ink-soft);';
  if (state.email) {
    p.textContent = '✓ 你已在名單上 (' + state.email.split('@')[0] + ') · 截止那天我寄信給你。';
    card.appendChild(p);
  } else {
    p.textContent = eg.body || '';
    card.appendChild(p);
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.style.fontSize = '13px';
    btn.style.padding = '8px 14px';
    btn.textContent = eg.ctaLabel || '▶ 留下 email';
    btn.addEventListener('click', jumpToGateEmail);
    card.appendChild(btn);
  }
  body.appendChild(card);
}

async function voteForSong(ep, song) {
  const s = epVoteState(ep.id);
  const cap = ep.voteCap || 3;
  if (Object.keys(s.votes).filter(k => s.votes[k]).length >= cap) {
    toast('你的 ' + cap + ' 票已用完。');
    return;
  }
  s.votes[song.id] = true;
  saveState();
  toast('★ 投了「' + song.title + '」');
  const newTally = await bumpSongTally(ep, song);
  // Re-render the detail view to reflect new state.
  renderSong(ep, song.id);
  if (newTally != null) {
    // No-op: renderSong's async fetchSongTally will pick it up.
  }
}

function unvoteForSong(ep, song) {
  const s = epVoteState(ep.id);
  delete s.votes[song.id];
  saveState();
  toast('取消對「' + song.title + '」的票 (公開計數器仍 +1,abacus 不支援 -1)');
  renderSong(ep, song.id);
}

// LEVEL SCENE
// ============================================================
let activeLevel = null;

// Per-level completion task. Different levels demand different
// actions — no generic "mark as done" button. Cleared only when
// the action is actually performed.
const LEVEL_ACTIONS = {
  L0: {
    type: 'button',
    label: '收下這封信 ✓',
    clearedMsg: '你收下了信。這張地圖就是接下來的走法。往下一關。',
  },
  L1: {
    type: 'listen',
    minSec: 15,
    prompt: '按下面的 ▶ PLAY,聽至少 15 秒。聽夠了,那面空白的牆會亮起來。',
    clearedMsg: '那面牆亮了。MV 的 0:47 等你把字寫上去。',
  },
  L2: {
    type: 'vote',
    prompt: '選一條路,下一首就走哪條。還沒填 email 的話看不到投票選項。',
    clearedMsg: '你投下了一票,下一關解鎖了。',
  },
  L3: {
    type: 'submit-tally',
    prompt: '寫一句「影響過你的歌詞」(任何人、中外皆可)。點按鈕 → 跳一個小框讓你寫 → 送出後 hao 收得到,精選的會 curate 進歌詞牆。',
    label: '📝 寫一句歌詞給歌詞牆',
    ctxLabel: 'L3 歌詞牆',
    clearedMsg: '✓ 點過了 — 你寫的字 hao 收得到。下面是已 curate 的歌詞牆。',
  },
  L4: {
    type: 'button',
    label: '🔥 啟動召喚陣',
    clearedMsg: '召喚陣啟動。等村民人數到門檻,客座 NPC 會現身。',
  },
};

function clearLevel(id, msg) {
  if (state.cleared.includes(id)) return;
  state.cleared.push(id);
  const lv = (CONTENT.levels || []).find(l => l.id === id);
  if (lv && lv.hasMissingPiece && !state.filled.includes(id)) {
    state.filled.push(id);
  }
  saveState();
  toast(msg || '✓ 已推進');
  if (activeLevel && activeLevel.id === id) {
    renderActionBlock(activeLevel);
    // Sync missing-piece UI to filled state (the ??? block)
    // (v0 missingPiece UI is force-hidden in renderLevel — no toggle needed.)
    stopTone();
    // (No auto-return — renderActionBlock draws a 繼續 → CTA button
    //  so the player decides when to move on. Keeps room for
    //  future paid-unlock / side-quest prompts next to it.)
  }
  renderNodes();
}

function renderActionBlock(lv) {
  const ab = document.getElementById('actionBlock');
  const body = document.getElementById('actionBody');
  const titleEl = document.getElementById('actionTitle');
  const action = LEVEL_ACTIONS[lv.id];
  if (!action) { ab.style.display = 'none'; return; }
  ab.style.display = 'block';
  body.innerHTML = '';

  const cleared = state.cleared.includes(lv.id);
  ab.classList.toggle('cleared', cleared);
  titleEl.textContent = cleared ? '✓ 任務完成' : '▸ 完成任務';

  if (cleared) {
    const p = document.createElement('p');
    p.className = 'action-cleared-msg';
    p.textContent = action.clearedMsg || '已完成。';
    body.appendChild(p);
    if (action.type === 'text' && state.texts && state.texts[lv.id]) {
      const yours = document.createElement('p');
      yours.className = 'action-prompt';
      yours.style.marginTop = '12px';
      yours.style.fontStyle = 'italic';
      yours.textContent = '你寫的:「' + state.texts[lv.id] + '」';
      body.appendChild(yours);
    }
    // Player-driven continue button — keeps pace in the player's hands.
    const cta = document.createElement('button');
    cta.className = 'action-btn';
    cta.textContent = '繼續 →';
    cta.style.marginTop = '16px';
    cta.addEventListener('click', () => navigate('#map'));
    body.appendChild(cta);
    // Also append join CTA in cleared state (unified at end of function)
    appendPaywallJoinBtn(body, lv.id);
    // Submit button — L1 (寫一句進 MV) and L3 (送字) need a way to actually
    // reach haohao. Without it L3 textarea only saves to localStorage.
    if (lv.id === 'L1' || lv.id === 'L3') {
      const ctxLabel = lv.id === 'L1' ? 'L1 第一首歌' : 'L3 寫字關';
      appendSubmitButton(body, ctxLabel, '📤 投稿給 hao (寫字 / 上傳照片錄音)');
    }
    // L3 cleared → show curated lyrics wall (other players' lines).
    if (lv.id === 'L3') {
      // L3 is now submit-tally type — text goes to Tally cloud, not localStorage.
      // No need for the legacy localStorage hint.
      appendLyricsWall(body);
    }
    // L4 finale: village threshold progress + EP2 CTA + open submission CTA
    // (last page = where players can dump anything photo/voice/file to hao).
    if (lv.id === 'L4') {
      appendVillageProgress(body);
      appendEndgameEmailCTA(body);
      appendSubmitButton(body, 'L4 闖完 · 任意投稿', '📨 想丟東西給 hao? (寫字 / 照片 / 錄音都可以)');
    }
    return;
  }

  if (action.type === 'button') {
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.textContent = action.label;
    btn.addEventListener('click', () => {
      // L4 召喚陣 — 玩家主動點啟動 = 算進門檻一次。flag 防止單個玩家
      // 重複按吹大數字。村民人數 (gate email) 是另一回事,不再 bump village-count。
      if (lv.id === 'L4' && !state.summonJoined) {
        state.summonJoined = true;
        bumpVillageCounter();
        saveState();
      }
      clearLevel(lv.id, action.clearedMsg);
    });
    body.appendChild(btn);
  } else if (action.type === 'listen') {
    const p = document.createElement('p');
    p.className = 'action-prompt';
    p.textContent = action.prompt;
    body.appendChild(p);
    const sec = Math.floor((state.listenSec && state.listenSec[lv.id]) || 0);
    const meter = document.createElement('div');
    meter.className = 'listen-meter';
    meter.innerHTML = `<div class="listen-bar" style="width:${Math.min(100, sec/action.minSec*100)}%"></div><span class="listen-label">${sec} / ${action.minSec} 秒</span>`;
    body.appendChild(meter);
  } else if (action.type === 'vote') {
    const p = document.createElement('p');
    p.className = 'action-prompt';
    p.textContent = state.email ? action.prompt.split('。')[0] + '。' : action.prompt;
    body.appendChild(p);
  } else if (action.type === 'text') {
    // Legacy: kept for backwards-compat if any level still uses type:text.
    // L3 has been migrated to submit-tally below.
    const p = document.createElement('p');
    p.className = 'action-prompt';
    p.textContent = action.prompt;
    body.appendChild(p);
    const textarea = document.createElement('textarea');
    textarea.className = 'action-text';
    textarea.rows = 4;
    textarea.placeholder = action.placeholder || '';
    textarea.value = (state.texts && state.texts[lv.id]) || '';
    body.appendChild(textarea);
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.textContent = '送出';
    btn.addEventListener('click', () => {
      const v = textarea.value.trim();
      if (v.length < 2) { toast('寫點什麼再送。'); return; }
      state.texts = state.texts || {};
      state.texts[lv.id] = v;
      saveState();
      clearLevel(lv.id, action.clearedMsg);
    });
    body.appendChild(btn);
  } else if (action.type === 'submit-tally') {
    // Single-button action: opens Tally modal + marks level cleared.
    // No localStorage textarea — submissions go straight to Tally cloud.
    const p = document.createElement('p');
    p.className = 'action-prompt';
    p.textContent = action.prompt;
    body.appendChild(p);
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.textContent = action.label || '📝 寫字 / 上傳';
    btn.addEventListener('click', () => {
      openSubmitModal(action.ctxLabel || lv.id);
      clearLevel(lv.id, action.clearedMsg);
    });
    body.appendChild(btn);
  }
  // Append join CTA in non-cleared state too (always offer the bundle).
  appendPaywallJoinBtn(body, lv.id);
  // (L3 submit button now built by renderActionBlock via type:submit-tally,
  //  no extra append needed.)
  // Show village progress on L4 even before "啟動" — players see their
  // contribution toward the threshold (their own email already counted).
  if (lv.id === 'L4') {
    appendVillageProgress(body);
  }
}

// ============================================================
// SHARED VOTE COUNTER (abacus.jasoncameron.dev — free, no auth)
// Each (levelId, choiceId) pair gets its own counter key.
// Only first pick per player hits the counter; re-picks are
// local-only so we don't inflate.
// ============================================================
const POLL_API = 'https://abacus.jasoncameron.dev';
const POLL_NS_BASE = 'hao-artist-rpg-mvp';
// Resolved namespace = base + optional reset suffix from content.json.
// Admin can hit "🔄 Reset counters" → bumps suffix → all abacus URLs point
// to fresh counters that start at 0. Old data stays at the old URL but
// nothing in the live app references it anymore.
function pollNs() {
  const suffix = (CONTENT.counterReset && CONTENT.counterReset.namespace) || '';
  return POLL_NS_BASE + (suffix ? '-' + suffix : '');
}
// Legacy alias for any inline references still using POLL_NS.
const POLL_NS = POLL_NS_BASE;

async function recordVote(levelId, choiceId) {
  const key = `vote-${String(levelId).toLowerCase()}-${String(choiceId).toLowerCase()}`;
  try {
    await fetch(`${POLL_API}/hit/${pollNs()}/${key}`);
  } catch (e) {
    console.warn('recordVote failed', e);
  }
}

async function fetchVoteResults(lv) {
  if (!lv.branches || !lv.branches.length) return null;
  const out = {};
  await Promise.all(lv.branches.map(async ch => {
    const key = `vote-${String(lv.id).toLowerCase()}-${String(ch.id).toLowerCase()}`;
    try {
      const res = await fetch(`${POLL_API}/get/${pollNs()}/${key}`);
      if (res.ok) {
        const data = await res.json();
        out[ch.id] = data.value || 0;
      } else {
        out[ch.id] = 0;
      }
    } catch {
      out[ch.id] = 0;
    }
  }));
  return out;
}

async function renderVoteResults(lv) {
  if (!state.picks[lv.id]) return; // don't show until voted
  const branchBlock = document.getElementById('branchBlock');
  if (!branchBlock || branchBlock.style.display === 'none') return;
  let resEl = branchBlock.querySelector('.vote-results');
  if (!resEl) {
    resEl = document.createElement('div');
    resEl.className = 'vote-results';
    resEl.innerHTML = '<div class="vote-results-title">◆ 目前投票結果</div><div class="vote-rows"><div class="vote-loading">載入中…</div></div>';
    branchBlock.appendChild(resEl);
  }
  const results = await fetchVoteResults(lv);
  if (!results) return;
  const total = Object.values(results).reduce((a, b) => a + b, 0);
  const rowsEl = resEl.querySelector('.vote-rows');
  rowsEl.innerHTML = '';
  lv.branches.forEach(ch => {
    const count = results[ch.id] || 0;
    const pct = total > 0 ? Math.round(count / total * 100) : 0;
    const row = document.createElement('div');
    row.className = 'vote-row';
    row.innerHTML =
      '<span class="vote-label">' + escapeHtml(ch.id) + '</span>' +
      '<div class="vote-bar-wrap"><div class="vote-bar" style="width:' + pct + '%"></div></div>' +
      '<span class="vote-pct">' + pct + '% · ' + count + ' 票</span>';
    rowsEl.appendChild(row);
  });
}

// ============================================================
// TONE GENERATOR — renders to WAV + plays via <audio> so iOS
// silent switch does NOT mute it (Web Audio API is muted by
// silent switch, but <audio> media is not).
// ============================================================
const NOTE_FREQ = {
  'C3':130.81,'D3':146.83,'E3':164.81,'F3':174.61,'G3':196.00,'A3':220.00,'B3':246.94,
  'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,'A4':440.00,
};
let audioEl = null;
let currentBlobUrl = null;
let toneCache = {};

function audioBufferToWavBlob(buffer) {
  const sampleRate = buffer.sampleRate;
  const samples = buffer.getChannelData(0);
  const len = samples.length;
  const bufferSize = 44 + len * 2;
  const arr = new ArrayBuffer(bufferSize);
  const view = new DataView(arr);
  const writeStr = (o, s) => { for (let i=0;i<s.length;i++) view.setUint8(o+i, s.charCodeAt(i)); };
  writeStr(0, 'RIFF');
  view.setUint32(4, bufferSize - 8, true);
  writeStr(8, 'WAVE');
  writeStr(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeStr(36, 'data');
  view.setUint32(40, len * 2, true);
  let o = 44;
  for (let i = 0; i < len; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(o, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    o += 2;
  }
  return new Blob([arr], { type: 'audio/wav' });
}

async function renderToneBlob(level, durationSec) {
  const cacheKey = `${level.id}-${durationSec}`;
  if (toneCache[cacheKey]) return toneCache[cacheKey];
  const sampleRate = 22050;
  const totalSamples = Math.floor(sampleRate * durationSec);
  const OfflineCtx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
  const ctx = new OfflineCtx(1, totalSamples, sampleRate);
  const baseFreq = NOTE_FREQ[level.toneNote] || 220;
  const stepSec = (60 / level.toneBpm) / 2;
  const melody = [0, 4, 7, 4, 0, 7, 4, 0];
  let t = 0, step = 0;
  while (t < durationSec - stepSec) {
    const osc = ctx.createOscillator();
    osc.type = 'square';
    const offset = melody[step % melody.length];
    osc.frequency.value = baseFreq * Math.pow(2, offset / 12);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + stepSec * 0.9);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start(t);
    osc.stop(t + stepSec);
    t += stepSec;
    step++;
  }
  const buffer = await ctx.startRendering();
  const blob = audioBufferToWavBlob(buffer);
  const url = URL.createObjectURL(blob);
  toneCache[cacheKey] = url;
  return url;
}

function ensureAudioEl() {
  if (audioEl) return audioEl;
  audioEl = document.createElement('audio');
  audioEl.setAttribute('playsinline', '');
  audioEl.setAttribute('webkit-playsinline', '');
  audioEl.preload = 'auto';
  audioEl.addEventListener('ended', stopTone);
  document.body.appendChild(audioEl);
  return audioEl;
}

// Listen-time tracker — accumulates seconds while tone is playing,
// saves to state, auto-clears level when threshold hit.
let listenTrackStart = null;
let listenTrackInterval = null;
let listenTrackLevelId = null;

function startListenTracking(levelId) {
  stopListenTracking();
  listenTrackStart = Date.now();
  listenTrackLevelId = levelId;
  listenTrackInterval = setInterval(() => {
    if (!listenTrackLevelId) return;
    const delta = (Date.now() - listenTrackStart) / 1000;
    listenTrackStart = Date.now();
    state.listenSec = state.listenSec || {};
    state.listenSec[listenTrackLevelId] = (state.listenSec[listenTrackLevelId] || 0) + delta;
    const action = LEVEL_ACTIONS[listenTrackLevelId];
    if (action && action.type === 'listen') {
      const sec = Math.floor(state.listenSec[listenTrackLevelId]);
      const meter = document.querySelector('.listen-bar');
      const label = document.querySelector('.listen-label');
      if (meter) meter.style.width = Math.min(100, sec / action.minSec * 100) + '%';
      if (label) label.textContent = `${sec} / ${action.minSec} 秒`;
      if (state.listenSec[listenTrackLevelId] >= action.minSec && !state.cleared.includes(listenTrackLevelId)) {
        clearLevel(listenTrackLevelId, action.clearedMsg);
      }
    }
  }, 500);
}

function stopListenTracking() {
  if (listenTrackInterval) { clearInterval(listenTrackInterval); listenTrackInterval = null; }
  if (listenTrackStart) {
    saveState();
    listenTrackStart = null;
  }
  listenTrackLevelId = null;
}

async function playTone() {
  if (!activeLevel) return;
  stopTone();
  const btn = document.getElementById('playTone');
  btn.textContent = '⏳ …';
  try {
    // Prefer uploaded mp3 (set via admin). Fall back to 8-bit generator.
    const uploaded = CONTENT.audio && CONTENT.audio.levels && CONTENT.audio.levels[activeLevel.id];
    const url = uploaded ? audioSrcWithVer(uploaded, 'levels.' + activeLevel.id) : await renderToneBlob(activeLevel, 30);
    const el = ensureAudioEl();
    el.src = url;
    el.currentTime = 0;
    await el.play();
    btn.textContent = '■ STOP';
    startListenTracking(activeLevel.id);
  } catch (e) {
    console.error(e);
    btn.textContent = '▶ PLAY';
    toast('播放失敗,再試一次');
  }
}

function stopTone() {
  if (audioEl) {
    audioEl.pause();
    try { audioEl.currentTime = 0; } catch {}
  }
  const btn = document.getElementById('playTone');
  if (btn) btn.textContent = '▶ PLAY';
  stopListenTracking();
}

document.getElementById('playTone').addEventListener('click', () => {
  if (audioEl && !audioEl.paused) stopTone();
  else playTone();
});

// ============================================================
// BGM — Two 8-bit tracks (intro + map) that crossfade between
// scenes. First user tap starts audio (browser autoplay rule).
// Level scene stops BGM (level has its own tone preview).
// ============================================================
function fadeVolume(el, from, to, ms, cb) {
  const start = Date.now();
  el.volume = from;
  (function tick() {
    if (!el) return;
    const p = Math.min(1, (Date.now() - start) / ms);
    el.volume = from + (to - from) * p;
    if (p < 1) requestAnimationFrame(tick);
    else cb && cb();
  })();
}

async function renderBgm({ baseFreq, bpm, melody, bass, durationSec = 8 }) {
  const sampleRate = 16000;
  const totalSamples = sampleRate * durationSec;
  const OfflineCtx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
  const ctx = new OfflineCtx(1, totalSamples, sampleRate);
  const stepSec = (60 / bpm) / 2;
  let t = 0, step = 0;
  while (t < durationSec - stepSec * 0.5) {
    const mOff = melody[step % melody.length];
    const bOff = bass[step % bass.length];
    const o1 = ctx.createOscillator();
    o1.type = 'square';
    o1.frequency.value = baseFreq * Math.pow(2, mOff / 12);
    const g1 = ctx.createGain();
    g1.gain.setValueAtTime(0.09, t);
    g1.gain.exponentialRampToValueAtTime(0.001, t + stepSec * 0.92);
    o1.connect(g1); g1.connect(ctx.destination);
    o1.start(t); o1.stop(t + stepSec);
    const o2 = ctx.createOscillator();
    o2.type = 'triangle';
    o2.frequency.value = baseFreq * Math.pow(2, bOff / 12);
    const g2 = ctx.createGain();
    g2.gain.setValueAtTime(0.13, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + stepSec * 0.85);
    o2.connect(g2); g2.connect(ctx.destination);
    o2.start(t); o2.stop(t + stepSec);
    t += stepSec;
    step++;
  }
  const buffer = await ctx.startRendering();
  return audioBufferToWavBlob(buffer);
}

const BGM_PATTERNS = {
  intro: {
    baseFreq: 261.63, bpm: 72,
    melody: [ 0, 4, 7, 4,  5, 9, 12, 9,  7, 11, 14, 11,  12, 7, 4, 0 ],
    bass:   [-12,-12,-12,-12, -7,-7,-7,-7, -5,-5,-5,-5, -12,-12,-12,-12],
  },
  map: {
    baseFreq: 220.00, bpm: 88,
    melody: [ 0, 3, 7, 3,  5, 8, 12, 8,  7, 10, 14, 10,  12, 7, 3, 0 ],
    bass:   [-12,-12,-12,-12, -7,-7,-7,-7, -5,-5,-5,-5, -12,-12,-12,-12],
  },
};

const bgmEls = {}; // scene -> audio element
const bgmUrls = {};
let activeBgmScene = null;

// Bust browser cache when admin uploads a new mp3 to the same slot.
// __audioVer is bumped by admin (admin.html) on every upload/clear/browse.
function getNestedVer(dotted) {
  if (!CONTENT.__audioVer) return null;
  return dotted.split('.').reduce((o, k) => (o ? o[k] : undefined), CONTENT.__audioVer);
}
function audioSrcWithVer(path, key) {
  if (!path) return path;
  const ver = getNestedVer(key);
  if (!ver) return path;
  const sep = path.includes('?') ? '&' : '?';
  return path + sep + 'v=' + ver;
}

async function getBgmUrl(scene) {
  // Prefer uploaded mp3 (set via admin); fall back to 8-bit blob.
  const uploaded = CONTENT.audio && CONTENT.audio.bgm && CONTENT.audio.bgm[scene];
  if (uploaded) return audioSrcWithVer(uploaded, 'bgm.' + scene);
  if (bgmUrls[scene]) return bgmUrls[scene];
  const blob = await renderBgm(BGM_PATTERNS[scene]);
  const url = URL.createObjectURL(blob);
  bgmUrls[scene] = url;
  return url;
}

async function switchBgm(toScene) {
  // Fade out the currently playing track
  if (activeBgmScene && activeBgmScene !== toScene && bgmEls[activeBgmScene]) {
    const old = bgmEls[activeBgmScene];
    fadeVolume(old, old.volume, 0, 500, () => {
      try { old.pause(); } catch {}
    });
  }
  activeBgmScene = toScene;
  if (!toScene) return;
  let el = bgmEls[toScene];
  if (!el) {
    try {
      const url = await getBgmUrl(toScene);
      el = document.createElement('audio');
      el.setAttribute('playsinline', '');
      el.setAttribute('webkit-playsinline', '');
      el.loop = true;
      el.src = url;
      el.volume = 0;
      document.body.appendChild(el);
      bgmEls[toScene] = el;
    } catch (e) {
      console.warn('BGM render failed', e);
      return;
    }
  }
  try {
    await el.play();
    fadeVolume(el, el.volume, 0.32, 800);
  } catch {
    // autoplay denied — will retry on next user gesture
  }
}

function bgmOnFirstGesture() {
  // Called from first user tap on intro dialog
  if (!activeBgmScene) switchBgm('intro');
}
