<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>關主登入 · Admin</title>
<meta name="robots" content="noindex">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

<style>
  :root {
    --gb-darkest: #0f380f;
    --gb-dark: #306230;
    --gb-mid: #8bac0f;
    --gb-light: #9bbc0f;
    --gb-lightest: #d0d88c;
    --paper: #efe9de;
    --paper-light: #fdfaf3;
    --paper-edge: #cbc0ae;
    --ink: #2a2624;
    --ink-soft: #7a6d5c;
    --gold: #b39a78;
    --gold-deep: #6a4e32;
    --danger: #a33;
    --success: #306230;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "PingFang TC", "Noto Sans TC", -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.7;
    min-height: 100vh;
    background-image: radial-gradient(rgba(15, 56, 15, 0.05) 1px, transparent 1px);
    background-size: 4px 4px;
  }
  .wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  .topbar {
    background: var(--gb-darkest);
    color: var(--gb-lightest);
    padding: 14px 20px;
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar .tb-left { display: flex; align-items: center; gap: 10px; }
  .topbar .badge {
    background: var(--gb-light);
    color: var(--gb-darkest);
    padding: 3px 8px;
    font-size: 9px;
    letter-spacing: 1px;
  }
  .topbar a {
    color: var(--gb-lightest);
    text-decoration: none;
    font-size: 10px;
    opacity: 0.8;
  }
  .topbar a:hover { opacity: 1; }

  h1.page-title {
    font-family: "Press Start 2P", monospace;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--gb-darkest);
    margin: 0 0 8px;
  }
  .page-sub {
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0 0 28px;
  }

  /* Panel card */
  .panel {
    background: var(--paper-light);
    border: 3px solid var(--gb-darkest);
    box-shadow: 5px 5px 0 var(--paper-edge);
    padding: 26px 22px;
    margin-bottom: 20px;
  }
  .panel .panel-title {
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    color: var(--gb-darkest);
    letter-spacing: 2px;
    margin: 0 0 14px;
  }
  .panel .panel-desc {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 18px;
  }

  /* Steps */
  .steps { display: flex; flex-direction: column; gap: 16px; }
  .step {
    padding: 18px;
    background: var(--paper);
    border-left: 4px solid var(--gold);
  }
  .step.active { border-left-color: var(--gb-dark); background: var(--gb-lightest); }
  .step.done { border-left-color: var(--gb-mid); opacity: 0.7; }
  .step .step-num {
    font-family: "Press Start 2P", monospace;
    font-size: 10px;
    color: var(--gold-deep);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .step .step-title {
    font-size: 15px;
    font-weight: 500;
    margin: 0 0 8px;
    letter-spacing: 1px;
  }
  .step .step-body {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.8;
  }
  .step .step-body p { margin: 0 0 10px; }
  .step .step-body b { color: var(--ink); }

  /* Inputs */
  input[type="password"],
  input[type="text"],
  input[type="number"],
  input[type="email"],
  textarea,
  select {
    width: 100%;
    padding: 10px 12px;
    font-family: "VT323", monospace;
    font-size: 17px;
    background: var(--paper);
    border: 2px solid var(--gb-darkest);
    color: var(--ink);
    resize: vertical;
  }
  input:focus, textarea:focus, select:focus { outline: none; background: var(--gb-lightest); }
  textarea { min-height: 70px; line-height: 1.5; }
  label.field {
    display: block;
    margin-bottom: 14px;
  }
  label.field .label-text {
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    color: var(--gb-dark);
    letter-spacing: 1.5px;
    display: block;
    margin-bottom: 5px;
  }
  label.field .hint {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 4px;
    font-style: italic;
  }

  /* Buttons */
  button, .btn {
    font-family: "PingFang TC", sans-serif;
    font-size: 13px;
    padding: 12px 18px;
    border: 2px solid var(--gb-darkest);
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-block;
    text-align: center;
  }
  .btn-primary, button.primary {
    background: var(--gb-dark);
    color: var(--paper-light);
  }
  .btn-primary:hover, button.primary:hover {
    background: var(--gb-darkest);
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--paper-edge);
  }
  .btn-secondary, button.secondary {
    background: var(--paper-light);
    color: var(--ink);
  }
  .btn-secondary:hover, button.secondary:hover { background: var(--gb-lightest); }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border-color: var(--danger);
  }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

  /* Open GitHub button (big, visual) */
  .big-action {
    display: block;
    width: 100%;
    padding: 20px;
    background: var(--gb-darkest);
    color: var(--gb-lightest);
    text-align: center;
    font-family: "Press Start 2P", monospace;
    font-size: 12px;
    letter-spacing: 2px;
    border: 3px solid var(--gb-darkest);
    text-decoration: none;
    transition: all 0.15s;
    margin: 10px 0;
  }
  .big-action:hover {
    background: var(--gb-dark);
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--gold);
  }
  .big-action .big-sub {
    display: block;
    font-family: "VT323", monospace;
    font-size: 14px;
    letter-spacing: 1px;
    margin-top: 8px;
    opacity: 0.8;
  }

  /* Alerts */
  .alert {
    padding: 12px 14px;
    margin: 12px 0;
    font-size: 13px;
    font-family: "VT323", monospace;
    font-size: 16px;
    letter-spacing: 0.5px;
  }
  .alert-error { background: #fdecec; border: 2px solid var(--danger); color: var(--danger); }
  .alert-ok { background: var(--gb-lightest); border: 2px solid var(--gb-dark); color: var(--gb-darkest); }
  .alert-info { background: var(--paper-light); border: 2px solid var(--gold); color: var(--gold-deep); }

  /* Editor sections */
  .editor-section {
    background: var(--paper);
    border: 2px solid var(--paper-edge);
    padding: 18px;
    margin-bottom: 14px;
  }
  .editor-section summary {
    cursor: pointer;
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    color: var(--gb-darkest);
    letter-spacing: 1.5px;
    padding: 4px 0;
    list-style: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .editor-section summary::after {
    content: "▶";
    font-size: 10px;
    color: var(--gold);
    transition: transform 0.2s;
  }
  .editor-section[open] summary::after { transform: rotate(90deg); }
  .editor-section .section-body { padding-top: 16px; }

  .intro-lines { display: flex; flex-direction: column; gap: 10px; }
  .intro-line-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .intro-line-row .row-num {
    font-family: "VT323", monospace;
    font-size: 16px;
    color: var(--gold-deep);
    padding-top: 10px;
    width: 20px;
    flex-shrink: 0;
  }
  .intro-line-row input { flex: 1; }
  .intro-line-row .remove-btn {
    padding: 8px 12px;
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--danger);
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .add-row-btn {
    padding: 8px 14px;
    background: var(--paper-light);
    border: 2px dashed var(--gb-dark);
    color: var(--gb-dark);
    font-family: "VT323", monospace;
    font-size: 16px;
    cursor: pointer;
    margin-top: 6px;
  }

  /* Sticky save bar */
  .save-bar {
    position: sticky;
    bottom: 0;
    background: var(--gb-darkest);
    margin: 24px -20px -80px;
    padding: 14px 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    z-index: 50;
    border-top: 3px solid var(--gb-light);
  }
  .save-bar .save-info {
    font-family: "VT323", monospace;
    font-size: 16px;
    color: var(--gb-lightest);
    flex: 1;
  }
  .save-bar .save-btn {
    padding: 12px 20px;
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    background: var(--gb-light);
    color: var(--gb-darkest);
    border: 2px solid var(--gb-light);
    letter-spacing: 2px;
    cursor: pointer;
  }
  .save-bar .save-btn:hover:not(:disabled) { background: var(--gb-mid); }
  .save-bar .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .hidden { display: none !important; }
  .mono { font-family: "VT323", monospace; font-size: 15px; }

  /* Login card — Gameboy-style, mirrors index.html .gate look */
  #sceneTokenSetup {
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  .login-card {
    width: 100%;
    max-width: 420px;
    margin: 56px auto 24px;
    padding: 40px 28px 32px;
    background: var(--paper-light);
    border: 3px solid var(--gb-darkest);
    box-shadow: 6px 6px 0 var(--paper-edge);
    text-align: center;
    position: relative;
  }
  .login-card .login-deco {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 32px;
    height: 32px;
    background: var(--gb-light);
    border: 3px solid var(--gb-darkest);
    display: block;
    image-rendering: pixelated;
  }
  .login-card .login-deco::before,
  .login-card .login-deco::after {
    content: "";
    position: absolute;
    background: var(--gb-darkest);
  }
  .login-card .login-deco::before {
    top: 28%;
    left: 36%;
    width: 28%;
    height: 18%;
  }
  .login-card .login-deco::after {
    bottom: 22%;
    left: 42%;
    width: 16%;
    height: 28%;
  }
  .login-card .login-sub {
    font-family: "VT323", monospace;
    font-size: 16px;
    color: var(--ink-soft);
    letter-spacing: 6px;
    margin: 14px 0 2px;
  }
  .login-card .login-title {
    font-family: "Press Start 2P", monospace;
    font-size: 16px;
    color: var(--gb-darkest);
    letter-spacing: 2px;
    margin: 0 0 28px;
    line-height: 1.5;
  }
  .login-card .login-form .field { margin-bottom: 18px; text-align: left; }
  .login-card .login-form input[type="password"] {
    padding: 12px 14px;
    font-size: 18px;
    letter-spacing: 2px;
    background: var(--paper);
    border: 2px solid var(--gb-darkest);
  }
  .login-card .login-form input[type="password"]:focus {
    outline: none;
    background: var(--gb-lightest);
    box-shadow: 3px 3px 0 var(--gb-dark);
  }
  .login-submit {
    font-family: "Press Start 2P", monospace;
    font-size: 12px;
    padding: 16px 18px;
    background: var(--gb-darkest);
    color: var(--gb-lightest);
    border: 2px solid var(--gb-darkest);
    cursor: pointer;
    letter-spacing: 3px;
    width: 100%;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .login-submit:hover:not(:disabled) {
    background: var(--gb-dark);
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--gb-light);
  }
  .login-submit:disabled {
    opacity: 0.6;
    cursor: wait;
  }
  .login-card .alert { margin-top: 12px; margin-bottom: 0; }

  @media (max-width: 600px) {
    .wrap { padding: 22px 14px 80px; }
    .topbar { font-size: 10px; padding: 12px 14px; }
    .panel { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <span>關主後台</span>
    <span class="badge" id="statusBadge">未登入</span>
  </div>
  <a href="index.html">← 回世界</a>
</div>

<div class="wrap">

<!-- ====================== SCENE: Login ====================== -->
<section id="sceneTokenSetup">
  <div class="login-card">
    <span class="login-deco"></span>
    <p class="login-sub">耗耗限定</p>
    <h1 class="login-title">haohao.unzip</h1>
    <form id="loginForm" class="login-form">
      <label class="field">
        <span class="label-text">PASSWORD</span>
        <input type="password" id="tokenInput" autocomplete="current-password" autofocus>
      </label>
      <button class="login-submit" id="btnVerifyToken" type="submit">▶ 登入</button>
      <div class="alert alert-error hidden" id="tokenErr"></div>
    </form>
  </div>
</section>

<!-- ====================== SCENE: Editor ====================== -->
<section id="sceneEditor" class="hidden">
  <h1 class="page-title">內容編輯</h1>
  <p class="page-sub">
    改完下面任一個欄位,按底部的「儲存到網站」。
    按了之後 GitHub 會收到新版 <span class="mono">content.json</span>,
    網站會在 30 秒 - 2 分鐘之內自動更新。
  </p>

  <div id="loadingContent" class="alert alert-info">讀取中...</div>
  <div id="editorBody" class="hidden">

    <!-- Meta -->
    <details class="editor-section" open>
      <summary>世界設定(標題 / 副標 / 說話人)</summary>
      <div class="section-body">
        <label class="field">
          <span class="label-text">PIXEL TITLE(頂部英文大字)</span>
          <input type="text" data-path="meta.pixelTitle">
        </label>
        <label class="field">
          <span class="label-text">SUBTITLE(副標)</span>
          <input type="text" data-path="meta.subtitle">
        </label>
        <label class="field">
          <span class="label-text">SPEAKER NAME(開場對話框上方的名字)</span>
          <input type="text" data-path="speaker">
        </label>
      </div>
    </details>

    <!-- Intro -->
    <details class="editor-section" open>
      <summary>開場對話(打字機一行一行跳的文字)</summary>
      <div class="section-body">
        <div class="intro-lines" id="introLinesEditor"></div>
        <button class="add-row-btn" id="addIntroLine">+ 加一行</button>
      </div>
    </details>

    <!-- Map -->
    <details class="editor-section">
      <summary>世界地圖標題 / 說明</summary>
      <div class="section-body">
        <label class="field">
          <span class="label-text">MAP TITLE</span>
          <input type="text" data-path="mapTitle">
        </label>
        <label class="field">
          <span class="label-text">MAP NOTE</span>
          <input type="text" data-path="mapNote">
        </label>
      </div>
    </details>

    <!-- Gate -->
    <details class="editor-section">
      <summary>加入村民區塊(email 註冊)</summary>
      <div class="section-body">
        <label class="field">
          <span class="label-text">GATE TITLE</span>
          <input type="text" data-path="gate.title">
        </label>
        <label class="field">
          <span class="label-text">GATE SUB</span>
          <input type="text" data-path="gate.sub">
        </label>
        <label class="field">
          <span class="label-text">GATE NOTE(小字斜體)</span>
          <input type="text" data-path="gate.note">
        </label>
        <label class="field">
          <span class="label-text">SUCCESS TEXT(填完 email 後出現的訊息)</span>
          <input type="text" data-path="gate.successText">
        </label>
      </div>
    </details>

    <!-- Levels -->
    <h2 class="page-title" style="font-size: 13px; margin-top: 28px;">▸ 關卡</h2>
    <div id="levelsEditor"></div>

  </div>

  <div class="save-bar" id="saveBar">
    <div class="save-info" id="saveInfo">就緒</div>
    <button class="save-btn" id="btnSave">儲存到網站</button>
  </div>

  <div class="btn-row" style="margin-top: 20px;">
    <button class="btn-danger" id="btnLogout">登出 + 清除 Token</button>
  </div>
</section>

</div>

<script>
// =======================================================
// CONFIG
// =======================================================
const REPO_OWNER = 'okiijuuhyygt';
const REPO_NAME  = 'artist-rpg-mvp';
const CONTENT_PATH = 'content.json';

const LS_TOKEN = 'hao-admin-token-v1';
const LS_DOWNLOAD_MODE = 'hao-admin-download-v1';

// =======================================================
// UTILS
// =======================================================
const $ = (id) => document.getElementById(id);
function show(id) { $(id).classList.remove('hidden'); }
function hide(id) { $(id).classList.add('hidden'); }
function setStatus(text) { $('statusBadge').textContent = text; }

function showScene(name) {
  ['sceneTokenSetup', 'sceneEditor'].forEach(s => {
    $(s).classList.add('hidden');
  });
  $(name).classList.remove('hidden');
}

function getPath(obj, path) {
  return path.split('.').reduce((o, k) => (o == null ? o : o[k]), obj);
}
function setPath(obj, path, value) {
  const keys = path.split('.');
  const last = keys.pop();
  const target = keys.reduce((o, k) => (o[k] = o[k] || {}), obj);
  target[last] = value;
}

// =======================================================
// ROUTER — no password layer. Token itself is the auth.
// Token exists in localStorage → direct to editor.
// Token missing → show Token setup wizard.
// =======================================================
function route() {
  const token = localStorage.getItem(LS_TOKEN);
  if (token) {
    setStatus('已登入');
    showScene('sceneEditor');
    initEditor();
  } else {
    setStatus('未登入');
    showScene('sceneTokenSetup');
  }
}

// =======================================================
// LOGIN
// =======================================================
$('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const tok = $('tokenInput').value.trim();
  const errEl = $('tokenErr');
  const btn = $('btnVerifyToken');
  errEl.classList.add('hidden');
  if (!tok) { return; }
  btn.disabled = true;
  btn.textContent = '驗證中...';
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONTENT_PATH}`, {
      headers: { 'Authorization': `Bearer ${tok}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!res.ok) throw new Error('auth-failed');
    localStorage.setItem(LS_TOKEN, tok);
    route();
  } catch (err) {
    errEl.textContent = '密碼不對';
    errEl.classList.remove('hidden');
    $('tokenInput').value = '';
    $('tokenInput').focus();
  } finally {
    btn.disabled = false;
    btn.textContent = '登入';
  }
});

// =======================================================
// EDITOR SCENE
// =======================================================
let contentData = null;
let contentSha = null;
let originalContent = null;

async function initEditor() {
  $('loadingContent').classList.remove('hidden');
  $('editorBody').classList.add('hidden');
  try {
    const res = await fetch(`content.json?t=${Date.now()}`);
    if (!res.ok) throw new Error('找不到 content.json');
    contentData = await res.json();
    originalContent = JSON.stringify(contentData);
    // Try to get SHA if we have a token
    const tok = localStorage.getItem(LS_TOKEN);
    if (tok) {
      try {
        const apiRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONTENT_PATH}`, {
          headers: { 'Authorization': `Bearer ${tok}`, 'Accept': 'application/vnd.github+json' }
        });
        if (apiRes.ok) {
          const data = await apiRes.json();
          contentSha = data.sha;
        }
      } catch {}
    }
    renderEditor();
    $('loadingContent').classList.add('hidden');
    $('editorBody').classList.remove('hidden');
  } catch (e) {
    $('loadingContent').textContent = '讀取失敗:' + e.message;
  }
  updateSaveBar();
}

function renderEditor() {
  // Simple text fields via data-path
  document.querySelectorAll('[data-path]').forEach(inp => {
    const path = inp.dataset.path;
    inp.value = getPath(contentData, path) || '';
    inp.addEventListener('input', () => {
      setPath(contentData, path, inp.value);
      updateSaveBar();
    });
  });
  // Intro lines
  renderIntroLines();
  // Levels
  renderLevels();
}

function renderIntroLines() {
  const box = $('introLinesEditor');
  box.innerHTML = '';
  (contentData.intro || []).forEach((line, idx) => {
    const row = document.createElement('div');
    row.className = 'intro-line-row';
    row.innerHTML = `
      <span class="row-num">${idx + 1}.</span>
      <input type="text" value="" />
      <button class="remove-btn" title="刪除此行">✕</button>
    `;
    const inp = row.querySelector('input');
    inp.value = line;
    inp.addEventListener('input', () => {
      contentData.intro[idx] = inp.value;
      updateSaveBar();
    });
    row.querySelector('.remove-btn').addEventListener('click', () => {
      if (!confirm(`刪掉這一行?「${line}」`)) return;
      contentData.intro.splice(idx, 1);
      renderIntroLines();
      updateSaveBar();
    });
    box.appendChild(row);
  });
}

$('addIntroLine').addEventListener('click', () => {
  contentData.intro = contentData.intro || [];
  contentData.intro.push('新的一行...');
  renderIntroLines();
  updateSaveBar();
});

function renderLevels() {
  const box = $('levelsEditor');
  box.innerHTML = '';
  (contentData.levels || []).forEach((lv, idx) => {
    const sec = document.createElement('details');
    sec.className = 'editor-section';
    sec.innerHTML = `
      <summary>${escapeHtml(lv.num || '??')} · ${escapeHtml(lv.title || '(未命名)')}</summary>
      <div class="section-body">
        <label class="field">
          <span class="label-text">關卡編號(顯示在地圖小方塊)</span>
          <input type="text" data-lv="${idx}" data-k="num">
        </label>
        <label class="field">
          <span class="label-text">標題</span>
          <input type="text" data-lv="${idx}" data-k="title">
        </label>
        <label class="field">
          <span class="label-text">副標(地圖上的一句話)</span>
          <input type="text" data-lv="${idx}" data-k="desc">
        </label>
        <label class="field">
          <span class="label-text">劇情(進關卡後的大段文字)</span>
          <textarea data-lv="${idx}" data-k="story" rows="5"></textarea>
        </label>
        <label class="field">
          <span class="label-text">標籤(main / side / hidden)</span>
          <select data-lv="${idx}" data-k="tag">
            <option value="main">main(主線)</option>
            <option value="side">side(支線)</option>
            <option value="hidden">hidden(隱藏)</option>
          </select>
        </label>
        <label class="field">
          <span class="label-text">試聽 · 音符(C3 D3 E3 F3 G3 A3 B3 C4...)</span>
          <input type="text" data-lv="${idx}" data-k="toneNote">
        </label>
        <label class="field">
          <span class="label-text">試聽 · BPM</span>
          <input type="number" data-lv="${idx}" data-k="toneBpm">
        </label>
        <label class="field">
          <span class="label-text">試聽 · 風格描述</span>
          <input type="text" data-lv="${idx}" data-k="toneMood">
        </label>
        <label class="field">
          <span class="label-text">
            <input type="checkbox" data-lv="${idx}" data-k="hasMissingPiece" style="width:auto; margin-right:6px;">
            有「???填空區」
          </span>
        </label>
        <label class="field">
          <span class="label-text">填空區說明文</span>
          <textarea data-lv="${idx}" data-k="mpCaption" rows="3"></textarea>
        </label>
      </div>
    `;
    box.appendChild(sec);

    // wire up
    sec.querySelectorAll('[data-lv]').forEach(inp => {
      const k = inp.dataset.k;
      const val = lv[k];
      if (inp.type === 'checkbox') {
        inp.checked = !!val;
        inp.addEventListener('change', () => {
          contentData.levels[idx][k] = inp.checked;
          updateSaveBar();
        });
      } else if (inp.tagName === 'SELECT') {
        inp.value = val || 'main';
        inp.addEventListener('change', () => {
          contentData.levels[idx][k] = inp.value;
          updateSaveBar();
        });
      } else {
        inp.value = val == null ? '' : val;
        inp.addEventListener('input', () => {
          const v = inp.type === 'number' ? Number(inp.value) : inp.value;
          contentData.levels[idx][k] = v;
          if (k === 'title' || k === 'num') {
            sec.querySelector('summary').textContent =
              `${contentData.levels[idx].num || '??'} · ${contentData.levels[idx].title || '(未命名)'}`;
          }
          updateSaveBar();
        });
      }
    });
  });
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function updateSaveBar() {
  const changed = JSON.stringify(contentData) !== originalContent;
  const downloadMode = localStorage.getItem(LS_DOWNLOAD_MODE) === '1';
  $('btnSave').disabled = !changed;
  if (!changed) {
    $('saveInfo').textContent = '沒有變更';
  } else if (downloadMode) {
    $('saveInfo').textContent = '有未儲存的變更(下載模式)';
    $('btnSave').textContent = '下載 content.json';
  } else {
    $('saveInfo').textContent = '有未儲存的變更';
    $('btnSave').textContent = '儲存到網站';
  }
}

// =======================================================
// SAVE
// =======================================================
$('btnSave').addEventListener('click', async () => {
  const downloadMode = localStorage.getItem(LS_DOWNLOAD_MODE) === '1';
  if (downloadMode) {
    // Download mode: just offer the JSON file
    const blob = new Blob([JSON.stringify(contentData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'content.json';
    a.click();
    URL.revokeObjectURL(url);
    originalContent = JSON.stringify(contentData);
    $('saveInfo').textContent = '✓ 已下載 content.json — 記得上傳回 GitHub';
    return;
  }
  const tok = localStorage.getItem(LS_TOKEN);
  if (!tok) {
    alert('Token 不見了,請重新設定');
    showScene('sceneTokenSetup');
    return;
  }
  $('btnSave').disabled = true;
  $('saveInfo').textContent = '儲存中...';
  try {
    // Re-fetch SHA in case it changed
    const shaRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONTENT_PATH}`, {
      headers: { 'Authorization': `Bearer ${tok}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!shaRes.ok) throw new Error('讀取舊檔失敗:' + shaRes.status);
    const shaData = await shaRes.json();
    const currentSha = shaData.sha;

    // Base64 encode (handle utf-8)
    const json = JSON.stringify(contentData, null, 2);
    const b64 = btoa(unescape(encodeURIComponent(json)));

    const putRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONTENT_PATH}`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${tok}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: 'admin: update content.json',
        content: b64,
        sha: currentSha
      })
    });
    if (!putRes.ok) {
      const txt = await putRes.text();
      throw new Error('寫入失敗:' + putRes.status + ' ' + txt.slice(0, 200));
    }
    originalContent = JSON.stringify(contentData);
    $('saveInfo').textContent = '✓ 已儲存!30 秒 - 2 分鐘內網站會更新。';
    $('btnSave').textContent = '儲存到網站';
  } catch (e) {
    $('saveInfo').textContent = '✗ ' + e.message;
  } finally {
    updateSaveBar();
  }
});

$('btnLogout').addEventListener('click', () => {
  if (!confirm('登出會清掉這個瀏覽器存的 Token(GitHub 上的 Token 不受影響)。確定?')) return;
  localStorage.removeItem(LS_TOKEN);
  localStorage.removeItem(LS_DOWNLOAD_MODE);
  location.reload();
});

// =======================================================
// BOOT
// =======================================================
(function boot() {
  // Token-only auth: no session concept. Route by token presence.
  route();
})();
</script>
</body>
</html>
